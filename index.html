<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cay Work — Gestionale</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg0:#040B16; --bg1:#081323; --bg2:#0D1D33; --bg3:#122742;
  --line:rgba(0,212,255,.10); --line2:rgba(0,212,255,.22);
  --cy:#00D4FF; --teal:#00E5C0; --amber:#FFB547; --fire:#FF8A3D; --coral:#FF5C7A; --blue:#6FA8FF;
  --t1:#EAF6FF; --t2:#8FB3CC; --t3:#52718A;
  --glow:0 0 18px rgba(0,212,255,.25);
  --r:14px;
  --disp:'Space Grotesk',sans-serif; --body:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:var(--bg0);color:var(--t1);font-family:var(--body);font-size:14px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(1100px 600px at 80% -10%,rgba(0,212,255,.07),transparent 60%),
  radial-gradient(900px 500px at -10% 110%,rgba(0,229,192,.05),transparent 60%);
  pointer-events:none;z-index:0}
#app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column}

/* ---------- TOPBAR ---------- */
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px 10px;flex-shrink:0}
.logo{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.logo .dot{width:9px;height:9px;border-radius:50%;background:var(--cy);box-shadow:0 0 10px var(--cy);animation:pulse 2.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.logo .sub{font-family:var(--mono);font-size:10px;color:var(--t3);font-weight:400;letter-spacing:1px;margin-left:2px}
.topbar .sp{flex:1}
.today-pill{font-family:var(--mono);font-size:11px;color:var(--t2);background:var(--bg1);border:1px solid var(--line);padding:6px 10px;border-radius:99px}

/* ---------- LAYOUT ---------- */
.main{flex:1;overflow-y:auto;padding:4px 16px 90px;-webkit-overflow-scrolling:touch}
@media(min-width:900px){
  #app{flex-direction:row}
  .sidewrap{width:212px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--line);padding:18px 12px}
  .main{padding:18px 26px 40px}
  .topbar{padding:0 0 18px 6px}
  .nav-bottom{display:none!important}
}
@media(max-width:899px){.sidewrap .nav-side{display:none}.sidewrap{padding:0}}

.nav-side{display:flex;flex-direction:column;gap:2px;margin-top:6px}
.nav-side .ni{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;color:var(--t2);cursor:pointer;font-size:13px;font-weight:500;border:1px solid transparent}
.nav-side .ni:hover{background:var(--bg1)}
.nav-side .ni.act{background:var(--bg2);color:var(--t1);border-color:var(--line2);box-shadow:var(--glow)}
.nav-side .ni .ic{width:18px;text-align:center}

.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:rgba(6,15,28,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:50}
.nav-bottom .nb{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--t3);font-size:9.5px;font-weight:600;cursor:pointer;padding:2px 6px;min-width:48px}
.nav-bottom .nb .ic{font-size:18px;line-height:1}
.nav-bottom .nb.act{color:var(--cy);text-shadow:0 0 12px rgba(0,212,255,.6)}

/* ---------- CARDS ---------- */
.card{background:linear-gradient(180deg,var(--bg1),var(--bg0));border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card.hl{border-color:var(--line2)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sh .t{font-family:var(--disp);font-weight:600;font-size:15px;letter-spacing:.3px}
.sh .a{font-size:12px;color:var(--cy);cursor:pointer;font-weight:600}
.pagetitle{font-family:var(--disp);font-weight:700;font-size:22px;margin:8px 0 14px;letter-spacing:.3px;display:flex;align-items:center;gap:10px}
.pagetitle .accent{width:4px;height:22px;border-radius:2px;background:var(--cy);box-shadow:0 0 12px var(--cy)}

/* ---------- HUB INPUT (signature) ---------- */
.hub{position:relative;margin:6px 0 16px}
.hub .ring{position:absolute;inset:-1px;border-radius:18px;background:linear-gradient(120deg,rgba(0,212,255,.5),rgba(0,229,192,.2),rgba(0,212,255,.5));opacity:.35;filter:blur(6px);pointer-events:none;transition:opacity .3s}
.hub.live .ring{opacity:.8}
.hub-box{position:relative;background:var(--bg1);border:1px solid var(--line2);border-radius:18px;padding:14px}
.hub-box textarea{width:100%;background:transparent;border:none;outline:none;color:var(--t1);font-family:var(--body);font-size:15px;resize:none;min-height:46px;line-height:1.45}
.hub-box textarea::placeholder{color:var(--t3)}
.hub-foot{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.hub-foot .sp{flex:1}
.chip{font-family:var(--mono);font-size:10.5px;padding:4px 9px;border-radius:99px;border:1px solid var(--line);color:var(--t2);background:var(--bg2)}
.chip.on{border-color:var(--cy);color:var(--cy);box-shadow:0 0 10px rgba(0,212,255,.25)}
.chip.warn{border-color:var(--amber);color:var(--amber)}
.btn{font-family:var(--disp);font-weight:600;font-size:13px;padding:9px 16px;border-radius:11px;border:1px solid var(--line2);background:var(--bg2);color:var(--t1);cursor:pointer}
.btn.pri{background:linear-gradient(135deg,#00B8E0,#00D4FF);color:#03121F;border:none;box-shadow:0 0 16px rgba(0,212,255,.35)}
.btn.ghost{background:transparent;border-color:var(--line)}
.btn.sm{padding:6px 11px;font-size:12px;border-radius:9px}
.btn.danger{border-color:rgba(255,92,122,.4);color:var(--coral)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;pointer-events:none}

/* parse preview */
.preview{margin-top:10px;border-top:1px dashed var(--line2);padding-top:10px;display:flex;flex-direction:column;gap:6px}
.preview .row{display:flex;align-items:center;gap:8px;font-size:13px;flex-wrap:wrap}
.preview .k{font-family:var(--mono);font-size:10px;color:var(--t3);width:74px;letter-spacing:.5px}
.preview .v{color:var(--t1);font-weight:500}
.preview .v.miss{color:var(--t3);font-style:italic;font-weight:400}

/* ---------- LISTS ---------- */
.item{display:flex;align-items:flex-start;gap:11px;padding:11px 4px;border-bottom:1px solid var(--line);cursor:pointer}
.item:last-child{border-bottom:none}
.item .led{width:8px;height:8px;border-radius:50%;margin-top:6px;flex-shrink:0}
.item .bd{flex:1;min-width:0}
.item .ti{font-weight:600;font-size:13.5px;line-height:1.35}
.item .su{font-size:11.5px;color:var(--t2);margin-top:2px;line-height:1.4}
.item .mt{font-family:var(--mono);font-size:10.5px;color:var(--t3);margin-top:3px}
.item .right{text-align:right;flex-shrink:0}
.item .right .d1{font-family:var(--mono);font-size:11px;color:var(--t2)}
.item .right .d2{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px}
.badge{display:inline-block;font-family:var(--mono);font-size:9.5px;padding:2px 7px;border-radius:99px;border:1px solid;letter-spacing:.4px}
.empty{text-align:center;color:var(--t3);padding:34px 16px;font-size:13px;line-height:1.6}
.empty .big{font-size:26px;margin-bottom:8px;opacity:.6}

/* stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--bg1);border:1px solid var(--line);border-radius:12px;padding:12px}
.stat .n{font-family:var(--mono);font-weight:600;font-size:20px}
.stat .l{font-size:10.5px;color:var(--t3);margin-top:3px;letter-spacing:.4px;text-transform:uppercase}

/* ---------- CALENDAR ---------- */
.cal-head{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cal-head .mon{font-family:var(--disp);font-weight:700;font-size:18px;flex:1;text-transform:capitalize}
.cal-nav{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:var(--bg1);color:var(--t1);font-size:15px;cursor:pointer}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{font-family:var(--mono);font-size:9.5px;color:var(--t3);text-align:center;padding:4px 0;letter-spacing:.5px}
.cal-cell{aspect-ratio:1/1.06;border-radius:10px;border:1px solid transparent;padding:5px 4px;cursor:pointer;display:flex;flex-direction:column;align-items:center;background:var(--bg1);position:relative;min-width:0}
.cal-cell.dim{opacity:.32}
.cal-cell .dn{font-family:var(--mono);font-size:12px;color:var(--t2)}
.cal-cell.today{border-color:var(--cy);box-shadow:0 0 10px rgba(0,212,255,.25)}
.cal-cell.today .dn{color:var(--cy);font-weight:600}
.cal-cell.sel{background:var(--bg3);border-color:var(--line2)}
.cal-dots{display:flex;gap:2.5px;margin-top:4px;flex-wrap:wrap;justify-content:center;max-width:100%}
.cal-dots i{width:5px;height:5px;border-radius:50%;display:block}
.cal-cell .more{font-family:var(--mono);font-size:8px;color:var(--t3);margin-top:2px}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:10px 2px 0}
.legend span{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--t2)}
.legend i{width:7px;height:7px;border-radius:50%}

/* ---------- CHAT ---------- */
.chatwrap{display:flex;flex-direction:column;height:calc(100dvh - 235px);min-height:300px}
@media(min-width:900px){.chatwrap{height:calc(100dvh - 200px)}}
.chat-scroll{flex:1;overflow-y:auto;padding:6px 2px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:82%;padding:9px 13px;border-radius:14px;font-size:13.5px;line-height:1.45;position:relative}
.msg.me{align-self:flex-end;background:linear-gradient(135deg,#063A4F,#075066);border:1px solid rgba(0,212,255,.25);border-bottom-right-radius:4px}
.msg.them{align-self:flex-start;background:var(--bg2);border:1px solid var(--line);border-bottom-left-radius:4px}
.msg.sys{align-self:center;background:rgba(0,229,192,.08);border:1px solid rgba(0,229,192,.3);color:var(--teal);font-size:12px;max-width:92%;border-radius:10px;font-family:var(--mono)}
.msg .who{font-family:var(--mono);font-size:9.5px;color:var(--cy);margin-bottom:3px;letter-spacing:.5px}
.msg .tm{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:4px;text-align:right}
.chat-input{display:flex;gap:8px;padding-top:10px;align-items:flex-end}
.chat-input textarea{flex:1;background:var(--bg1);border:1px solid var(--line2);border-radius:14px;color:var(--t1);font-family:var(--body);font-size:14px;padding:11px 13px;resize:none;outline:none;max-height:110px;min-height:44px;line-height:1.4}
.send{width:44px;height:44px;border-radius:13px;border:none;background:linear-gradient(135deg,#00B8E0,#00D4FF);color:#03121F;font-size:17px;cursor:pointer;box-shadow:0 0 14px rgba(0,212,255,.35);flex-shrink:0}
.speaker-row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px}
.speaker{font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:99px;border:1px solid var(--line);color:var(--t2);background:var(--bg1);cursor:pointer;white-space:nowrap}
.speaker.on{border-color:var(--cy);color:var(--cy);box-shadow:0 0 10px rgba(0,212,255,.2)}
.wa-note{font-size:11px;color:var(--t3);background:var(--bg1);border:1px dashed var(--line2);border-radius:10px;padding:8px 11px;margin-bottom:8px;line-height:1.5}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;background:rgba(2,8,16,.7);backdrop-filter:blur(5px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadein .18s}
@media(min-width:700px){.overlay{align-items:center}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--bg1);border:1px solid var(--line2);border-radius:20px 20px 0 0;width:100%;max-width:560px;max-height:88dvh;overflow-y:auto;padding:20px 18px calc(20px + env(safe-area-inset-bottom));animation:slideup .22s}
@media(min-width:700px){.sheet{border-radius:20px;animation:popin .18s}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
@keyframes popin{from{transform:scale(.96);opacity:0}to{transform:none;opacity:1}}
.sheet h3{font-family:var(--disp);font-size:17px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.sheet h3 .x{font-size:20px;color:var(--t3);cursor:pointer;padding:2px 8px}
.fld{margin-bottom:12px}
.fld label{display:block;font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.6px;margin-bottom:5px;text-transform:uppercase}
.fld input,.fld select,.fld textarea{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--t1);font-family:var(--body);font-size:14px;padding:10px 12px;outline:none}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--cy)}
.fld textarea{resize:vertical;min-height:64px}
.frow{display:flex;gap:10px}.frow .fld{flex:1}
.sheet .actions{display:flex;gap:10px;margin-top:16px}
.sheet .actions .btn{flex:1}
.seg{display:flex;gap:6px;flex-wrap:wrap}
.seg .sg{font-size:12px;padding:7px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg2);color:var(--t2);cursor:pointer;font-weight:500}
.seg .sg.on{border-color:var(--cy);color:var(--cy)}

/* lock screen */
.lock{position:fixed;inset:0;background:var(--bg0);z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.lock::before{content:'';position:fixed;inset:0;background:radial-gradient(900px 500px at 50% -10%,rgba(0,212,255,.10),transparent 60%);pointer-events:none}
.lock .llogo{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:1px;display:flex;align-items:center;gap:12px;margin-bottom:6px}
.lock .llogo .dot{width:12px;height:12px;border-radius:50%;background:var(--cy);box-shadow:0 0 16px var(--cy);animation:pulse 2.6s infinite}
.lock .lsub{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:2px;margin-bottom:30px}
.lock .lbox{width:100%;max-width:360px;background:var(--bg1);border:1px solid var(--line2);border-radius:20px;padding:22px;position:relative;z-index:1}
.lock .users{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}
.lock .uchip{font-size:13px;font-weight:600;padding:9px 16px;border-radius:99px;border:1px solid var(--line);color:var(--t2);background:var(--bg2);cursor:pointer}
.lock .uchip.on{border-color:var(--cy);color:var(--cy);box-shadow:0 0 12px rgba(0,212,255,.25)}
.lock input{width:100%;background:var(--bg2);border:1px solid var(--line2);border-radius:12px;color:var(--t1);font-family:var(--mono);font-size:20px;text-align:center;letter-spacing:8px;padding:13px;outline:none;margin-bottom:12px}
.lock input:focus{border-color:var(--cy)}
.lock input.txt{font-family:var(--body);font-size:14px;letter-spacing:normal;text-align:left}
.lock .lerr{color:var(--coral);font-size:12px;text-align:center;margin-bottom:10px;min-height:16px}
.lock .llink{text-align:center;margin-top:14px;font-size:12.5px;color:var(--cy);cursor:pointer;font-weight:600}
/* toast */
#toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--cy);color:var(--t1);padding:10px 18px;border-radius:12px;font-size:13px;z-index:200;box-shadow:var(--glow);opacity:0;pointer-events:none;transition:opacity .25s;max-width:90vw;text-align:center}
#toast.show{opacity:1}
@media(min-width:900px){#toast{bottom:30px}}

.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto}
.tabs .tb{font-size:12px;font-weight:600;padding:7px 13px;border-radius:99px;border:1px solid var(--line);color:var(--t2);background:var(--bg1);cursor:pointer;white-space:nowrap}
.tabs .tb.on{border-color:var(--cy);color:var(--cy)}
.searchbar{width:100%;background:var(--bg1);border:1px solid var(--line);border-radius:11px;color:var(--t1);font-size:13.5px;padding:10px 13px;outline:none;margin-bottom:10px}
.searchbar:focus{border-color:var(--cy)}
.fab{position:fixed;right:18px;bottom:84px;width:54px;height:54px;border-radius:17px;border:none;background:linear-gradient(135deg,#00B8E0,#00D4FF);color:#03121F;font-size:25px;cursor:pointer;box-shadow:0 6px 20px rgba(0,212,255,.4);z-index:40}
@media(min-width:900px){.fab{bottom:26px;right:26px}}
.linkline{font-size:12px;color:var(--cy);cursor:pointer;font-weight:600}
/* checklist */
.cklist{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:10px}
.cklist:last-child{margin-bottom:0}
.cklist .ck-head{display:flex;align-items:center;gap:8px;margin-bottom:6px;cursor:pointer}
.cklist .ck-name{font-family:var(--disp);font-weight:600;font-size:13.5px;flex:1}
.cklist .ck-prog{font-family:var(--mono);font-size:10px;color:var(--t3)}
.ck-bar{height:3px;border-radius:2px;background:var(--bg0);margin-bottom:8px;overflow:hidden}
.ck-bar i{display:block;height:100%;background:linear-gradient(90deg,#00D4FF,#00E5C0);border-radius:2px;transition:width .3s;box-shadow:0 0 6px rgba(0,212,255,.5)}
.ck-it{display:flex;align-items:center;gap:10px;padding:6px 0;cursor:pointer}
.ck-box{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:#03121F;transition:all .15s}
.ck-it.done .ck-box{background:var(--teal);border-color:var(--teal);box-shadow:0 0 8px rgba(0,229,192,.4)}
.ck-it .ck-tx{font-size:13px;flex:1}
.ck-it.done .ck-tx{color:var(--t3);text-decoration:line-through}
.ck-add{display:flex;gap:7px;margin-top:7px}
.ck-add input{flex:1;background:var(--bg0);border:1px solid var(--line);border-radius:9px;color:var(--t1);font-size:12.5px;padding:7px 10px;outline:none}
.ck-add input:focus{border-color:var(--cy)}
.ck-add button{width:32px;border-radius:9px;border:1px solid var(--line2);background:var(--bg1);color:var(--cy);font-size:15px;cursor:pointer}
/* bollettino & firma */
.row-act{font-family:var(--mono);font-size:10px;padding:5px 10px;border-radius:99px;border:1px solid var(--cy);color:var(--cy);cursor:pointer;white-space:nowrap;background:rgba(0,212,255,.06)}
.row-act.done{border-color:var(--teal);color:var(--teal);background:rgba(0,229,192,.06)}
.blt-task{display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer;border-bottom:1px solid var(--line)}
.blt-task:last-child{border-bottom:none}
.part-row{display:flex;gap:7px;margin-bottom:7px}
.part-row input:first-child{flex:2.5}
.part-row input:last-child{flex:1}
.sig-wrap{background:#fff;border-radius:12px;border:1px solid var(--line2);overflow:hidden;position:relative}
.sig-canvas{display:block;width:100%;height:160px;touch-action:none;cursor:crosshair}
.sig-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#aab;font-size:13px;pointer-events:none;font-style:italic}
.sig-tools{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.subtle{font-size:11.5px;color:var(--t3);line-height:1.5}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <div class="sidewrap">
    <div class="topbar">
      <div class="logo"><span class="dot"></span>CAY WORK <span class="sub">GESTIONALE</span></div>
      <div class="sp"></div>
      <div class="today-pill" id="todaypill"></div>
      <div class="today-pill" style="cursor:pointer" onclick="openSearch()">🔍</div>
    </div>
    <div class="nav-side" id="navside"></div>
  </div>
  <div class="main" id="main"></div>
  <div class="nav-bottom" id="navbottom"></div>
</div>
<div id="toast"></div>
<script>
/* ================= STATE + SUPABASE ================= */

const TBL={employees:'employees',clients:'clients',noteGroups:'note_groups',lists:'lists',maintenances:'maintenances',appointments:'appointments',pellet:'pellet',sites:'sites',notes:'notes',listItems:'list_items',siteLogs:'site_logs',callLog:'call_log'};
const UP_ORDER=['employees','clients','noteGroups','lists','maintenances','appointments','pellet','sites','notes','listItems','siteLogs','callLog'];
const DEL_ORDER=['callLog','siteLogs','listItems','notes','sites','pellet','appointments','maintenances','lists','noteGroups','clients','employees'];
function rebuildSnapshot(){const r=dbRows();for(const k of UP_ORDER)snapRows(k,r[k]);snapshot._settings=JSON.stringify(S.settings);}

/* ---------- sync: diff e push ---------- */
let syncTimer=null,syncing=false,syncDirty=false;
function save(){syncDirty=true;clearTimeout(syncTimer);syncTimer=setTimeout(syncNow,300);}
async function syncNow(){
  if(!S.session)return;
  if(syncing){syncDirty=true;return;}
  syncing=true;syncDirty=false;
  try{
    const rows=dbRows();
    for(const k of UP_ORDER){
      if(k==='employees'&&!isOwner())continue;
      const prev=snapshot[k]||{};
      const ups=rows[k].filter(r=>prev[r.id]!==JSON.stringify(r));
      if(ups.length){const{error}=await sb.from(TBL[k]).upsert(ups);if(error)throw error;}
    }
    for(const k of DEL_ORDER){
      if(k==='employees'&&!isOwner())continue;
      const prev=snapshot[k]||{};
      const cur=new Set(rows[k].map(r=>r.id));
      const dels=Object.keys(prev).filter(id=>!cur.has(id));
      if(dels.length){const{error}=await sb.from(TBL[k]).delete().in('id',dels);if(error)throw error;}
    }
    if(isOwner()&&snapshot._settings!==JSON.stringify(S.settings)){
      const{error}=await sb.from('settings').update({company_name:S.settings.companyName||'',bags_per_pallet:S.settings.bagsPerPallet||70,price_per_ton:num(S.settings.pricePerTon),price_per_bag:num(S.settings.pricePerBag)}).eq('id',1);
      if(error)throw error;
    }
    rebuildSnapshot();
  }catch(e){console.error(e);toast('⚠ Sincronizzazione: '+(e.message||e));}
  finally{syncing=false;if(syncDirty)save();}
}

}

const $=s=>document.querySelector(s);
const esc=s=>String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const MESI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
const GG=['domenica','lunedì','martedì','mercoledì','giovedì','venerdì','sabato'];
const pad=n=>String(n).padStart(2,'0');
const iso=d=>d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
const todayIso=()=>iso(new Date());
function fmtD(s){if(!s)return'';const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const t=new Date();t.setHours(0,0,0,0);const diff=Math.round((dt-t)/86400000);
  let base=d+' '+MESI[m-1].slice(0,3)+(y!==t.getFullYear()?' '+y:'');
  if(diff===0)return'Oggi · '+base; if(diff===1)return'Domani · '+base; if(diff===2)return'Dopodomani · '+base;
  if(diff>2&&diff<7)return GG[dt.getDay()]+' · '+base; return base;}
function fmtTime(t){return t||''}
function relDays(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d);const t=new Date();t.setHours(0,0,0,0);return Math.round((dt-t)/86400000);}
function toast(msg){const t=$('#toast');t.innerHTML=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}

function addMonthsIso(s,m){const[y,mo,d]=s.split('-').map(Number);const dt=new Date(y,mo-1+m,1);const last=new Date(dt.getFullYear(),dt.getMonth()+1,0).getDate();dt.setDate(Math.min(d,last));return iso(dt);}
function shiftDate(inputId,days){const el=$('#'+inputId);const base=el.value||todayIso();const[y,m,d]=base.split('-').map(Number);const dt=new Date(y,m-1,d+days);el.value=iso(dt);}
const dateChips=id=>`<div class="seg" style="margin:-4px 0 12px"><div class="sg" onclick="$('#${id}').value=todayIso()">oggi</div><div class="sg" onclick="shiftDate('${id}',1)">+1 giorno</div><div class="sg" onclick="shiftDate('${id}',7)">+1 settimana</div></div>`;

const norm=s=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

/* ================= PARSER (no AI — pattern matching IT) ================= */
function parseDateIT(text){
  const t=norm(text);const now=new Date();now.setHours(0,0,0,0);
  let date=null,matched='';
  let m;
  if((m=t.match(/\bdopodomani\b/))){const d=new Date(now);d.setDate(d.getDate()+2);date=iso(d);matched=m[0];}
  else if((m=t.match(/\bdomani\b/))){const d=new Date(now);d.setDate(d.getDate()+1);date=iso(d);matched=m[0];}
  else if((m=t.match(/\boggi\b/))){date=iso(now);matched=m[0];}
  else if((m=t.match(/\b(lunedi|martedi|mercoledi|giovedi|venerdi|sabato|domenica)\b/))){
    const names=['domenica','lunedi','martedi','mercoledi','giovedi','venerdi','sabato'];
    const target=names.indexOf(m[1]);const d=new Date(now);let add=(target-d.getDay()+7)%7;if(add===0)add=7;d.setDate(d.getDate()+add);date=iso(d);matched=m[1];}
  else if((m=t.match(/\b(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\b/))){
    let[,d1,m1,y1]=m;let y=y1?(+y1<100?2000+(+y1):+y1):now.getFullYear();
    const cand=new Date(y,+m1-1,+d1);if(!y1&&cand<now)cand.setFullYear(y+1);
    if(cand.getDate()==+d1)date=iso(cand);matched=m[0];}
  else if((m=t.match(/\b(?:il\s+)?(\d{1,2})\s+(gennaio|febbraio|marzo|aprile|maggio|giugno|luglio|agosto|settembre|ottobre|novembre|dicembre)\b/))){
    const mi=MESI.indexOf(m[2]);const cand=new Date(now.getFullYear(),mi,+m[1]);if(cand<now)cand.setFullYear(now.getFullYear()+1);date=iso(cand);matched=m[0];}
  else if((m=t.match(/\btra\s+(\d{1,2})\s+giorni\b/))){const d=new Date(now);d.setDate(d.getDate()+ +m[1]);date=iso(d);matched=m[0];}
  // time
  let time=null,tm;
  if((tm=t.match(/\balle?\s+(\d{1,2})(?:[:\.](\d{2}))?\b/))||(tm=t.match(/\bore\s+(\d{1,2})(?:[:\.](\d{2}))?\b/))){
    let h=+tm[1],mi=tm[2]?+tm[2]:0;
    if(h>=1&&h<=7)h+=12; // "alle 4" in orario lavorativo → 16:00
    if(h<=23)time=pad(h)+':'+pad(mi);
  }
  return{date,time,matched};
}
function findPerson(text){
  const t=norm(text);
  // try clients first, then employees — longest name match wins
  let best=null;
  for(const c of S.clients){const n=norm(c.name);if(n&&t.includes(n)&&(!best||n.length>best.len))best={kind:'client',id:c.id,name:c.name,len:n.length};}
  for(const e of S.employees){const n=norm(e.name);if(n&&t.includes(n)&&(!best||n.length>best.len))best={kind:'employee',id:e.id,name:e.name,len:n.length};}
  if(best)return best;
  // fallback: "a Nome" / "da Nome" / "per Nome" / "cliente Nome"
  const m=text.match(/\b(?:a|da|per|cliente|sig\.?|signora?)\s+([A-ZÀ-Ý][a-zà-ÿ]+(?:\s+[A-ZÀ-Ý][a-zà-ÿ]+)?)/);
  if(m)return{kind:'raw',id:null,name:m[1],len:m[1].length};
  return null;
}
function parseInput(text){
  const t=norm(text);
  const r={type:null,title:text.trim(),date:null,time:null,person:null,qty:null,unit:null,raw:text.trim()};
  // type detection
  if(/\blista\b/.test(t))r.type='list';
  else if(/^\s*(ricordami|ricorda|nota|promemoria)\b/.test(t)&&!/\b(manutenzion\w*|pellet|appuntament\w*|cantier\w*)\b/.test(t))r.type='note';
  else if(/\bmanutenzion|pulizia\s+(caldaia|stufa)|revisione|tagliando|filtri\b/.test(t))r.type='maintenance';
  else if(/\bpellet|sacch|bancal|consegna|sfuso\b/.test(t))r.type='pellet';
  else if(/\bcantiere|installazione|montaggio|posa\b/.test(t))r.type='site';
  else if(/\bappuntamento|sopralluogo|incontro|riunione|chiamare|telefonare|richiamare|preventivo\b/.test(t))r.type='appointment';
  else if(/\bnota|ricorda(?:re|mi)?|promemoria|segna(?:re)?\b/.test(t))r.type='note';
  const dd=parseDateIT(text);r.date=dd.date;r.time=dd.time;
  if(!r.type&&r.date)r.type='appointment';
  if(!r.type)r.type='note';
  r.person=findPerson(text);
  // aggiornamento cantiere esistente: "aggiungi 4 ore al cantiere Via Roma" / "cantiere Via Roma: posato basamento"
  if(/\bcantier\w*\b/.test(t)){
    let best=null;
    for(const s of S.sites){const n=norm(s.name);if(n&&t.includes(n)&&(!best||n.length>best.len))best={id:s.id,name:s.name,len:n.length};}
    if(best){
      r.type='site';r.siteId=best.id;r.siteName=best.name;
      const hm=t.match(/(\d+(?:[\.,]\d+)?)\s*or[ae]\b/);
      if(hm)r.hours=parseFloat(hm[1].replace(',','.'));
      let st=text.replace(/^\s*(aggiungi|segna|metti|registra)\s+/i,'').replace(/(\d+(?:[\.,]\d+)?)\s*or[ae]\b/i,'').replace(/\b(al|nel|sul)?\s*cantiere\s+/i,'');
      const escRe=x=>x.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      st=st.replace(new RegExp(escRe(best.name),'i'),'').replace(new RegExp(escRe(best.name.replace(/^cantiere\s+/i,'')),'i'),'');
      st=st.replace(/^[\s:\-–,]+|[\s:\-–,]+$/g,'').trim();
      r.siteText=st||null;
    }
  }
  // quantities
  let q;
  if((q=t.match(/(\d+(?:[\.,]\d+)?)\s*(sacch\w*|bancal\w*|tonnellat\w*|ton\b|t\b|kg\b|quintal\w*)/))){
    r.qty=parseFloat(q[1].replace(',','.'));
    const u=q[2];
    if(u.startsWith('bancal')){r.qty=r.qty*(S.settings.bagsPerPallet||70);r.unit='sacchi';}
    else if(u.startsWith('sacch'))r.unit='sacchi';
    else if(u.startsWith('ton')||u==='t')r.unit='t';
    else if(u==='kg'){if(/\bsfuso\b/.test(t)){r.qty=r.qty/1000;r.unit='t';}else r.unit='kg';}
    else if(u.startsWith('quintal')){r.qty=r.qty/10;r.unit='t';}
  }
  if(/\bsfuso\b/.test(t)&&r.unit==null&&r.type==='pellet')r.unit='t';
  // liste: "lista ferramenta: viti, tasselli" / "aggiungi guanti alla lista ferramenta"
  if(r.type==='list'){
    const splitItems=s=>s.split(/\s*,\s*|\s+e\s+/i).map(x=>x.trim()).filter(Boolean);
    let lm;
    if((lm=text.match(/aggiungi\s+(.+?)\s+(?:alla|nella|in)\s+lista\s+([\wÀ-ÿ' ]+)/i))){
      r.listName=lm[2].trim();r.listItems=splitItems(lm[1]);r.listAppend=true;
    }else if((lm=text.match(/lista\s+([^:\-]+?)\s*[:\-]\s*(.+)/i))){
      r.listName=lm[1].trim();r.listItems=splitItems(lm[2]);
    }else if((lm=text.match(/lista\s+(?:per\s+|di\s+|della\s+)?([\wÀ-ÿ' ]+)/i))){
      r.listName=lm[1].trim();r.listItems=[];
    }else{r.listName='Nuova lista';r.listItems=[];}
  }
  // clean title: remove command verbs and matched fragments
  let title=text.trim()
    .replace(/^\s*(aggiungi|segna|metti|crea|ricordami|ricorda|nota|inserisci|programma)\s+/i,'')
    .replace(/\b(per\s+)?(oggi|domani|dopodomani)\b/gi,'')
    .replace(/\balle?\s+\d{1,2}([:\.]\d{2})?\b/gi,'')
    .replace(/\bore\s+\d{1,2}([:\.]\d{2})?\b/gi,'')
    .replace(/\s{2,}/g,' ').replace(/[\s,]+$/,'').trim();
  if(title)r.title=title.charAt(0).toUpperCase()+title.slice(1);
  return r;
}

/* commit parsed object into state */
function commitParsed(p,via){
  const clientId=p.person&&p.person.kind==='client'?p.person.id:null;
  const employeeId=p.person&&p.person.kind==='employee'?p.person.id:null;
  const personRaw=p.person&&p.person.kind==='raw'?p.person.name:null;
  let msg='';
  if(p.type==='maintenance'){
    S.maintenances.unshift({id:uid(),title:p.title,clientId,clientRaw:personRaw,employeeId,date:p.date,time:p.time,status:p.date?'programmata':'da_fare',notes:'',via,created:Date.now()});
    msg='🔧 Manutenzione registrata'+(p.person?' — '+p.person.name:'')+(p.date?' · '+fmtD(p.date):'')+(p.time?' '+p.time:'');
  }else if(p.type==='pellet'){
    const kind=(p.unit==='t'||/\bsfuso\b/i.test(p.raw||''))?'sfuso':'sacchi';
    S.pellet.unshift({id:uid(),clientId,clientRaw:personRaw,qty:p.qty,unit:kind==='sfuso'?'t':(p.unit||'sacchi'),kind,date:p.date,time:p.time,status:'da_consegnare',notes:p.title,via,created:Date.now()});
    msg='🔥 Consegna '+(kind==='sfuso'?'sfuso':'sacchi')+' registrata'+(p.qty?' — '+p.qty+' '+(kind==='sfuso'?'t':p.unit||'sacchi'):'')+(p.person?' · '+p.person.name:'')+(p.date?' · '+fmtD(p.date):'');
  }else if(p.type==='appointment'){
    S.appointments.unshift({id:uid(),title:p.title,clientId,clientRaw:personRaw,employeeId,date:p.date||todayIso(),time:p.time,done:false,via,created:Date.now()});
    msg='📅 Appuntamento segnato — '+fmtD(p.date||todayIso())+(p.time?' '+p.time:'');
  }else if(p.type==='list'){
    const nm=norm(p.listName||'');
    let L=S.lists.find(l=>norm(l.name)===nm||norm(l.name).includes(nm)||nm.includes(norm(l.name)));
    if(L&&(p.listAppend||p.listItems.length)){
      p.listItems.forEach(t=>L.items.push({id:uid(),text:t,done:false}));
      msg='☑️ '+p.listItems.length+' voci aggiunte a «'+L.name+'»';
    }else{
      S.lists.unshift({id:uid(),name:p.listName||'Nuova lista',items:(p.listItems||[]).map(t=>({id:uid(),text:t,done:false})),via,created:Date.now()});
      msg='☑️ Lista «'+(p.listName||'Nuova lista')+'» creata'+(p.listItems.length?' con '+p.listItems.length+' voci':'');
    }
  }else if(p.type==='site'){
    if(p.siteId){
      const s=byId(S.sites,p.siteId);
      s.log.push({date:p.date||todayIso(),text:p.siteText||'Aggiornamento',hours:p.hours||null});
      msg='🏗 «'+s.name+'» aggiornato'+(p.hours?' — +'+p.hours+'h':'')+(p.siteText?' · '+p.siteText:'');
    }else{
      S.sites.unshift({id:uid(),name:p.title,clientId,clientRaw:personRaw,status:'aperto',employees:[],log:[],attachments:[],estHours:null,startDate:p.date||todayIso(),dueDate:null,notes:'',via,created:Date.now()});
      msg='🏗 Cantiere creato — '+p.title;
    }
  }else{
    S.notes.unshift({id:uid(),text:p.title,clientId,date:p.date,pinned:false,via,created:Date.now()});
    msg='📝 Nota salvata';
  }
  save();return msg;
}

function importBackup(ev){

      if(!d||!Array.isArray(d.clients))throw new Error('struttura');
      if(!confirm('Importare il backup nel cloud? I dati verranno AGGIUNTI a quelli attuali.'))return;
      toast('⏳ Importo…');
      const map={};const mid=o=>{if(!o)return null;if(o==='me')return S.session.empId;if(!map[o])map[o]=uid();return map[o];};
      (d.employees||[]).forEach(e=>{if(e.id==='me')return;S.employees.push({id:mid(e.id),name:e.name,role:e.role||'',phone:e.phone||'',perms:e.perms||['cal','man','chat'],isOwner:false,active:e.active!==false,inviteCode:genInvite(e.name),userId:null});});
      (d.clients||[]).forEach(c=>S.clients.push({id:mid(c.id),name:c.name,phone:c.phone||'',zone:c.zone||'',group:c.group||'',address:c.address||'',plant:c.plant||'',pellet:c.pellet||'',maintenance:c.maintenance||'',notes:c.notes||'',created:c.created||Date.now()}));
      (d.noteGroups||[]).forEach(g=>S.noteGroups.push({id:mid(g.id),name:g.name}));
      (d.maintenances||[]).forEach(m=>S.maintenances.push({id:mid(m.id),title:m.title,clientId:mid(m.clientId),clientRaw:m.clientRaw||null,employeeId:mid(m.employeeId),date:m.date||null,time:m.time||null,status:m.status||'da_fare',notes:m.notes||'',recur:m.recur||0,price:m.price||null,report:m.report||null,via:m.via||'import',created:m.created||Date.now()}));
      (d.appointments||[]).forEach(a=>S.appointments.push({id:mid(a.id),title:a.title,clientId:mid(a.clientId),clientRaw:a.clientRaw||null,employeeId:mid(a.employeeId),date:a.date||null,time:a.time||null,done:!!a.done,via:a.via||'import',created:a.created||Date.now()}));
      (d.pellet||[]).forEach(p=>S.pellet.push({id:mid(p.id),clientId:mid(p.clientId),clientRaw:p.clientRaw||null,qty:p.qty||null,unit:p.unit||'sacchi',kind:p.kind||'sacchi',date:p.date||null,time:p.time||null,status:p.status||'da_consegnare',price:p.price||null,signature:p.signature||null,signedName:p.signedName||'',notes:p.notes||'',via:p.via||'import',created:p.created||Date.now()}));
      const pendingAtt=[];
      (d.sites||[]).forEach(s=>{
        const ns={id:mid(s.id),name:s.name,clientId:mid(s.clientId),clientRaw:s.clientRaw||null,status:['aperto','da_fatturare','chiuso'].includes(s.status)?s.status:'aperto',employees:(s.employees||[]).map(mid).filter(Boolean),estHours:s.estHours||null,amount:s.amount||null,startDate:s.startDate||null,dueDate:s.dueDate||null,notes:s.notes||'',via:s.via||'import',created:s.created||Date.now(),
          log:(s.log||[]).map(l=>({id:uid(),date:l.date||null,text:l.text,hours:l.hours||null,empId:mid(l.empId)})),attachments:[]};
        (s.attachments||[]).forEach(a=>{if(a.dataUrl)pendingAtt.push({siteId:ns.id,a});});
        S.sites.push(ns);
      });
      (d.notes||[]).forEach(n=>S.notes.push({id:mid(n.id),text:n.text,clientId:mid(n.clientId),groupId:mid(n.groupId),date:n.date||null,pinned:!!n.pinned,archived:!!n.archived,via:n.via||'import',created:n.created||Date.now()}));
      (d.lists||[]).forEach(l=>S.lists.push({id:mid(l.id),name:l.name,via:l.via||'import',created:l.created||Date.now(),items:(l.items||[]).map(i=>({id:uid(),text:i.text,done:!!i.done}))}));
      (d.callLog||[]).forEach(c=>S.callLog.push({id:uid(),clientId:mid(c.clientId),year:c.year,called:!!c.called,outcome:c.outcome||'',note:c.note||'',maintId:mid(c.maintId)}));
      if(d.settings){Object.assign(S.settings,{bagsPerPallet:d.settings.bagsPerPallet||S.settings.bagsPerPallet,companyName:d.settings.companyName||S.settings.companyName,pricePerTon:d.settings.pricePerTon||S.settings.pricePerTon,pricePerBag:d.settings.pricePerBag||S.settings.pricePerBag});}
      await syncNow();
      for(const{siteId,a}of pendingAtt){
        try{
          const blob=await(await fetch(a.dataUrl)).blob();
          const path=siteId+'/'+uid()+'-'+a.name;
          await sb.storage.from('allegati').upload(path,blob,{contentType:blob.type||'application/octet-stream'});
          const row={id:uid(),site_id:siteId,name:a.name,type:a.type||'file',storage_path:path,date:a.date||todayIso()};

        }catch(e){console.error('allegato',e);}
      }
      closeSheet();render();toast('✓ Backup importato nel cloud'+(pendingAtt.length?' con '+pendingAtt.length+' allegati':''));
    }catch(e){console.error(e);toast('⚠️ Import: '+(e.message||'file non valido'));}
  };
  r.readAsText(f);
}

  if(authMode==='link'){
    lockShell(`

  setTimeout(()=>{const f=$('#lk-email');if(f)f.focus();},80);

function lockErr(m){const e=$('#lk-err');if(e)e.textContent=m;authBusy=false;}
async function doLogin(){
  if(authBusy)return;authBusy=true;
  const email=$('#lk-email').value.trim(),pass=$('#lk-pass').value;
  if(!email||!pass)return lockErr('Email e password');
  const{error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)return lockErr(error.message.includes('Invalid')?'Email o password sbagliate':error.message);
  authBusy=false;postAuth();
}
async function doSignup(){
  if(authBusy)return;authBusy=true;
  const email=$('#lk-email').value.trim(),pass=$('#lk-pass').value;
  if(!email||pass.length<6)return lockErr('Email valida e password di almeno 6 caratteri');
  const{error}=await sb.auth.signUp({email,password:pass});
  if(error)return lockErr(error.message.includes('already')?'Email già registrata — torna al login':error.message);
  authBusy=false;postAuth();
}
async function doClaimOwner(){
  if(authBusy)return;authBusy=true;
  const name=$('#lk-name').value.trim();
  if(!name)return lockErr('Scrivi il tuo nome');
  const{data,error}=await sb.rpc('claim_owner',{owner_name:name});
  if(error)return lockErr(error.message);
  if(!data)return lockErr('Il titolare esiste già — usa un codice di invito');
  authBusy=false;postAuth();
}
async function doClaimInvite(){
  if(authBusy)return;authBusy=true;
  const code=$('#lk-code').value.trim();
  if(!code)return lockErr('Inserisci il codice');
  const{data,error}=await sb.rpc('claim_invite',{code});
  if(error)return lockErr(error.message);
  if(!data)return lockErr('Codice non valido o già usato');
  authBusy=false;postAuth();
}
async function postAuth(){
  try{
    const{data:{user}}=await sb.auth.getUser();
    if(!user){authMode='login';renderLock();return;}
    authMode='loading';renderLock();
    const{data:emp,error}=await sb.from('employees').select('*').eq('user_id',user.id).maybeSingle();
    if(error)throw error;
    if(!emp){authMode='link';renderLock();return;}
    if(!emp.active){await sb.auth.signOut();authMode='login';renderLock();setTimeout(()=>lockErr('Accesso disattivato dal titolare'),100);return;}
    await loadAll();
    const my=byId(S.employees,emp.id)||MAPS.employees.fromDb(emp);
    if(!byId(S.employees,emp.id))S.employees.push(my);
    S.session={empId:emp.id};S.speaker=emp.id;
    startRealtime();
    view='hub';render();toast('Ciao '+my.name+' 👋');
  }catch(e){console.error(e);authMode='login';renderLock();setTimeout(()=>lockErr('Errore: '+(e.message||e)),100);}
}

/* visibilità per ruolo: il titolare vede tutto, gli altri solo ciò che è loro */
const visMan=()=>isOwner()?S.maintenances:S.maintenances.filter(m=>m.employeeId===S.session.empId);
const visApp=()=>isOwner()?S.appointments:S.appointments.filter(a=>a.employeeId===S.session.empId||!a.employeeId);
const visSites=()=>isOwner()?S.sites:S.sites.filter(s=>s.employees.includes(S.session.empId));
function allEvents(){
  const ev=[];
  visApp().forEach(a=>{if(a.date)ev.push({type:'appointment',date:a.date,time:a.time,title:a.title,sub:cName(a.clientId)||a.clientRaw||'',done:a.done,id:a.id});});
  visMan().forEach(m=>{if(m.date)ev.push({type:'maintenance',date:m.date,time:m.time,title:m.title,sub:cName(m.clientId)||m.clientRaw||'',done:m.status==='fatta',id:m.id});});
  (can('pellet')?S.pellet:[]).forEach(p=>{if(p.date)ev.push({type:'pellet',date:p.date,time:p.time,title:(p.qty?p.qty+' '+p.unit:'Consegna pellet'),sub:cName(p.clientId)||p.clientRaw||'',done:p.status==='consegnato',id:p.id});});
  S.notes.forEach(n=>{if(n.date&&!n.archived)ev.push({type:'note',date:n.date,time:null,title:n.text,sub:'',done:false,id:n.id});});
  visSites().forEach(s=>{if(s.dueDate&&s.status==='aperto')ev.push({type:'site',date:s.dueDate,time:null,title:'🏁 Fine prevista: '+s.name,sub:cName(s.clientId)||s.clientRaw||'',done:false,id:s.id});});
  return ev.sort((a,b)=>(a.date+(a.time||'99'))<(b.date+(b.time||'99'))?-1:1);
}

/* ================= HUB ================= */
let hubParsed=null;
function renderHub(){
  const ev=allEvents();const t=todayIso();
  const todayEv=ev.filter(e=>e.date===t&&!e.done);
  const next=ev.filter(e=>e.date>t&&!e.done).slice(0,5);
  const late=ev.filter(e=>e.date<t&&!e.done).slice(0,4);
  const openMan=S.maintenances.filter(m=>m.status!=='fatta').length;
  const openPel=S.pellet.filter(p=>p.status!=='consegnato').length;
  $('#main').innerHTML=`
  <div class="pagetitle"><span class="accent"></span>Hub</div>
  <div class="hub" id="hub"><div class="ring"></div>
    <div class="hub-box">
      <textarea id="hubinput" rows="2" placeholder="Scrivi qui e ci penso io a smistare…&#10;es. «aggiungi manutenzione a Rossi domani alle 4»"></textarea>
      <div class="hub-foot" id="hubchips"><span class="chip">🔧 manutenzioni</span><span class="chip">🔥 pellet</span><span class="chip">📅 appuntamenti</span><span class="chip">📝 note</span><span class="chip">🏗 cantieri</span><span class="chip">☑️ liste</span></div>
      <div id="hubpreview"></div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="n" style="color:var(--cy)">${todayEv.length}</div><div class="l">Oggi</div></div>
    <div class="stat"><div class="n" style="color:var(--amber)">${openMan}</div><div class="l">Manutenzioni aperte</div></div>
    <div class="stat"><div class="n" style="color:var(--fire)">${openPel}</div><div class="l">Consegne pellet</div></div>
    <div class="stat"><div class="n" style="color:var(--coral)">${late.length}</div><div class="l">In ritardo</div></div>
  </div>
  ${late.length?`<div class="card" style="border-color:rgba(255,92,122,.35)"><div class="sh"><span class="t" style="color:var(--coral)">⚠ In ritardo</span></div>${late.map(evRow).join('')}</div>`:''}
  <div class="card"><div class="sh"><span class="t">☑️ Liste</span><span class="a" onclick="newList()">+ Nuova lista</span></div>
    ${S.lists.length?S.lists.map(L=>{
      const done=L.items.filter(i=>i.done).length,tot=L.items.length;
      return`<div class="cklist">
      <div class="ck-head" onclick="listMenu('${L.id}')"><span class="ck-name">${esc(L.name)}</span><span class="ck-prog">${done}/${tot}</span><span style="color:var(--t3);font-size:13px">⋯</span></div>
      ${tot?`<div class="ck-bar"><i style="width:${tot?Math.round(done/tot*100):0}%"></i></div>`:''}
      ${L.items.map(i=>`<div class="ck-it ${i.done?'done':''}" onclick="ckToggle('${L.id}','${i.id}')"><span class="ck-box">${i.done?'✓':''}</span><span class="ck-tx">${esc(i.text)}</span></div>`).join('')}
      <div class="ck-add"><input id="cka-${L.id}" placeholder="Aggiungi voce…" onkeydown="if(event.key==='Enter')ckAdd('${L.id}')" onclick="event.stopPropagation()"><button onclick="ckAdd('${L.id}')">+</button></div>
      </div>`;
    }).join(''):'<div class="empty">Nessuna lista. Creane una qui o dall\'Hub:<br>«lista ferramenta: viti, tasselli, silicone»</div>'}
  </div>
  <div class="card hl"><div class="sh"><span class="t">Oggi</span><span class="a" onclick="nav('cal')">Calendario →</span></div>
    ${todayEv.length?todayEv.map(evRow).join(''):'<div class="empty"><div class="big">🌊</div>Niente in programma oggi.</div>'}
  </div>
  <div class="card"><div class="sh"><span class="t">Prossimi</span></div>
    ${next.length?next.map(evRow).join(''):'<div class="empty">Nessun evento futuro.</div>'}
  </div>`;
  const ta=$('#hubinput');
  ta.addEventListener('input',()=>{
    const v=ta.value.trim();const hub=$('#hub');
    if(!v){hub.classList.remove('live');hubParsed=null;$('#hubpreview').innerHTML='';resetChips();return;}
    hub.classList.add('live');hubParsed=parseInput(v);showPreview();
  });
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();hubCommit();}});
}
function resetChips(){document.querySelectorAll('#hubchips .chip').forEach(c=>c.classList.remove('on'));}
function showPreview(){
  const p=hubParsed;if(!p)return;
  resetChips();
  const order={maintenance:0,pellet:1,appointment:2,note:3,site:4,list:5};
  const chips=document.querySelectorAll('#hubchips .chip');
  if(chips[order[p.type]])chips[order[p.type]].classList.add('on');
  const M=TYPE_META[p.type];
  if(p.type==='list'){
    $('#hubpreview').innerHTML=`<div class="preview">
    <div class="row"><span class="k">SEZIONE</span><span class="badge" style="border-color:${M.hex};color:${M.hex}">${M.ic} ${M.label}</span></div>
    <div class="row"><span class="k">LISTA</span><span class="v">${esc(p.listName||'')}</span></div>
    <div class="row"><span class="k">VOCI</span><span class="v ${p.listItems&&p.listItems.length?'':'miss'}">${p.listItems&&p.listItems.length?p.listItems.map(esc).join(' · '):'lista vuota'}</span></div>
    <div class="row" style="margin-top:4px;gap:10px">
      <button class="btn pri sm" onclick="hubCommit()">✓ Conferma</button>
      <button class="btn ghost sm" onclick="cycleType()">↻ Cambia sezione</button>
    </div></div>`;
    return;
  }
  $('#hubpreview').innerHTML=`<div class="preview">
    <div class="row"><span class="k">SEZIONE</span><span class="badge" style="border-color:${M.hex};color:${M.hex}">${M.ic} ${M.label}</span></div>
    <div class="row"><span class="k">TESTO</span><span class="v">${esc(p.title)}</span></div>
    <div class="row"><span class="k">PERSONA</span><span class="v ${p.person?'':'miss'}">${p.person?esc(p.person.name)+(p.person.kind==='employee'?' (personale)':p.person.kind==='client'?' (cliente)':''):'—'}</span>${p.person&&p.person.kind==='raw'?`<button class="btn sm" style="border-color:var(--teal);color:var(--teal)" onclick="createClientFromPreview()">✚ Crea cliente</button>`:''}</div>
    <div class="row"><span class="k">QUANDO</span><span class="v ${p.date?'':'miss'}">${p.date?fmtD(p.date)+(p.time?' · '+p.time:''):'senza data'}</span></div>
    ${p.qty?`<div class="row"><span class="k">QUANTITÀ</span><span class="v">${p.qty} ${p.unit||''}</span></div>`:''}
    <div class="row" style="margin-top:4px;gap:10px">
      <button class="btn pri sm" onclick="hubCommit()">✓ Conferma</button>
      <button class="btn ghost sm" onclick="cycleType()">↻ Cambia sezione</button>
    </div></div>`;
}
function createClientFromPreview(){
  if(!hubParsed||!hubParsed.person||hubParsed.person.kind!=='raw')return;
  const name=hubParsed.person.name;
  const c={id:uid(),name,phone:'',zone:'',address:'',notes:'',created:Date.now()};
  S.clients.unshift(c);save();
  hubParsed.person={kind:'client',id:c.id,name,len:name.length};
  showPreview();toast('👥 Cliente «'+name+'» creato — completa la scheda quando vuoi');
}
function cycleType(){
  if(!hubParsed)return;
  const seq=['maintenance','pellet','appointment','note','site','list'];
  hubParsed.type=seq[(seq.indexOf(hubParsed.type)+1)%seq.length];
  showPreview();
}
function hubCommit(){
  if(!hubParsed){const v=$('#hubinput').value.trim();if(!v)return;hubParsed=parseInput(v);}
  const msg=commitParsed(hubParsed,'hub');
  hubParsed=null;toast(msg);render();
}
function ckToggle(lid,iid){const L=byId(S.lists,lid);const i=byId(L.items,iid);i.done=!i.done;save();render();}
function ckAdd(lid){const inp=$('#cka-'+lid);const t=inp.value.trim();if(!t)return;byId(S.lists,lid).items.push({id:uid(),text:t,done:false});save();render();setTimeout(()=>{const n=$('#cka-'+lid);if(n)n.focus();},0);}
function newList(){
  openSheet(`<h3>Nuova lista <span class="x" onclick="closeSheet()">✕</span></h3>
  <div class="fld"><label>Nome</label><input id="nl-n" placeholder="es. Ferramenta, Furgone, Da ordinare"></div>
  <div class="fld"><label>Voci (una per riga, opzionale)</label><textarea id="nl-i" placeholder="viti 6x40&#10;tasselli&#10;silicone"></textarea></div>
  <div class="actions"><button class="btn ghost" onclick="closeSheet()">Annulla</button><button class="btn pri" onclick="saveNewList()">Crea</button></div>`);
}
function saveNewList(){
  const n=$('#nl-n').value.trim();if(!n){toast('Manca il nome');return;}
  const items=$('#nl-i').value.split('\n').map(x=>x.trim()).filter(Boolean).map(t=>({id:uid(),text:t,done:false}));
  S.lists.unshift({id:uid(),name:n,items,via:'manuale',created:Date.now()});
  save();closeSheet();render();toast('☑️ Lista creata');
}
function listMenu(lid){
  const L=byId(S.lists,lid);if(!L)return;
  const done=L.items.filter(i=>i.done).length;
  openSheet(`<h3>${esc(L.name)} <span class="x" onclick="closeSheet()">✕</span></h3>
  <div class="subtle" style="margin-bottom:12px">${done}/${L.items.length} fatte</div>
  <div class="fld"><label>Rinomina</label><input id="lm-n" value="${esc(L.name)}"></div>
  <div class="actions">
    <button class="btn danger" onclick="if(confirm('Eliminare la lista?')){S.lists=S.lists.filter(x=>x.id!=='${lid}');save();closeSheet();render();toast('Eliminata');}">Elimina</button>
    <button class="btn" onclick="const L=byId(S.lists,'${lid}');L.items=L.items.filter(i=>!i.done);save();closeSheet();render();toast('Voci fatte rimosse')">Pulisci fatte</button>
    <button class="btn pri" onclick="const L=byId(S.lists,'${lid}');L.name=$('#lm-n').value.trim()||L.name;save();closeSheet();render()">Salva</button></div>`);
}
function openEv(type,id){
  if(type==='appointment')openApp(id);
  else if(type==='maintenance')openMan(id);
  else if(type==='pellet')openPel(id);
  else if(type==='note')openNote(id);
  else if(type==='site')openSite(id);
  else nav(TYPE_META[type].view);
}
function evRow(e){
  const M=TYPE_META[e.type];
  return`<div class="item" onclick="openEv('${e.type}','${e.id}')">
    <span class="led" style="background:${M.hex};box-shadow:0 0 8px ${M.hex}"></span>
    <div class="bd"><div class="ti">${esc(e.title)}</div>${e.sub?`<div class="su">${esc(e.sub)}</div>`:''}</div>
    <div class="right"><div class="d1">${e.time||''}</div><div class="d2">${fmtD(e.date)}</div></div>
  </div>`;
}

/* ================= CALENDARIO ================= */
let calCur=new Date();let calSel=todayIso();let calMode='mese';
function renderCal(){
  if(calMode==='agenda'){renderAgenda();return;}
  const calTabs=`<div class="tabs"><div class="tb on">Mese</div><div class="tb" onclick="calMode='agenda';render()">Agenda</div></div>`;
  const y=calCur.getFullYear(),m=calCur.getMonth();
  const first=new Date(y,m,1);let startDow=(first.getDay()+6)%7; // lun=0
  const daysIn=new Date(y,m+1,0).getDate();
  const ev=allEvents();const map={};ev.forEach(e=>{(map[e.date]=map[e.date]||[]).push(e)});
  let cells='';
  const prevDays=new Date(y,m,0).getDate();
  for(let i=0;i<42;i++){
    let d,mm=m,yy=y,dim=false;
    if(i<startDow){d=prevDays-startDow+1+i;mm=m-1;dim=true;}
    else if(i<startDow+daysIn){d=i-startDow+1;}
    else{d=i-startDow-daysIn+1;mm=m+1;dim=true;}
    const dt=new Date(yy,mm,d);const di=iso(dt);
    const evs=map[di]||[];
    const dots=evs.slice(0,4).map(e=>`<i style="background:${TYPE_META[e.type].hex}"></i>`).join('');
    cells+=`<div class="cal-cell ${dim?'dim':''} ${di===todayIso()?'today':''} ${di===calSel?'sel':''}" onclick="calPick('${di}')">
      <span class="dn">${d}</span><span class="cal-dots">${dots}</span>${evs.length>4?`<span class="more">+${evs.length-4}</span>`:''}</div>`;
    if(i>=startDow+daysIn-1&&(i+1)%7===0)break;
  }
  const selEv=(map[calSel]||[]);
  $('#main').innerHTML=`
  <div class="pagetitle"><span class="accent" style="background:var(--cy)"></span>Calendario</div>
  ${calTabs}
  <div class="card hl">
    <div class="cal-head">
      <div class="mon">${MESI[m]} ${y}</div>
      <button class="cal-nav" onclick="calShift(-1)">‹</button>
      <button class="cal-nav" onclick="calToday()" style="width:auto;padding:0 12px;font-size:11px;font-family:var(--mono)">oggi</button>
      <button class="cal-nav" onclick="calShift(1)">›</button>
    </div>
    <div class="cal-grid">${['LU','MA','ME','GI','VE','SA','DO'].map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    <div class="legend">${Object.values(TYPE_META).filter(t=>t.label!=='Lista').map(t=>`<span><i style="background:${t.hex}"></i>${t.label}</span>`).join('')}</div>
  </div>
  <div class="card"><div class="sh"><span class="t">${fmtD(calSel)}</span><span class="a" onclick="openQuickAdd('${calSel}')">+ Aggiungi</span></div>
    ${selEv.length?selEv.map(evRow).join(''):`<div class="empty">Giornata libera.<br><button class="btn pri sm" style="margin-top:10px" onclick="openQuickAdd('${calSel}')">+ Aggiungi evento</button></div>`}
  </div>
  <button class="fab" onclick="openQuickAdd('${calSel}')">+</button>`;
}
function calShift(n){calCur=new Date(calCur.getFullYear(),calCur.getMonth()+n,1);render();}
function renderAgenda(){
  const ev=allEvents().filter(e=>!e.done);
  const t=todayIso();
  const late=ev.filter(e=>e.date<t);
  const now=new Date();now.setHours(0,0,0,0);
  let daysHtml='';
  for(let i=0;i<14;i++){
    const d=new Date(now);d.setDate(d.getDate()+i);const di=iso(d);
    const evs=ev.filter(e=>e.date===di);
    if(!evs.length&&i>0)continue;
    daysHtml+=`<div class="card ${i===0?'hl':''}"><div class="sh"><span class="t" style="${i===0?'color:var(--cy)':''}">${fmtD(di)}</span><span class="a" onclick="openQuickAdd('${di}')">+ Aggiungi</span></div>
    ${evs.length?evs.map(evRow).join(''):'<div class="empty" style="padding:18px">Libero.</div>'}</div>`;
  }
  $('#main').innerHTML=`
  <div class="pagetitle"><span class="accent" style="background:var(--cy)"></span>Calendario</div>
  <div class="tabs"><div class="tb" onclick="calMode='mese';render()">Mese</div><div class="tb on">Agenda</div></div>
  ${late.length?`<div class="card" style="border-color:rgba(255,92,122,.35)"><div class="sh"><span class="t" style="color:var(--coral)">⚠ In ritardo</span></div>${late.map(evRow).join('')}</div>`:''}
  ${daysHtml||'<div class="card"><div class="empty"><div class="big">🌊</div>Prossime 2 settimane libere.</div></div>'}`;
}
function calToday(){calCur=new Date();calSel=todayIso();render();}
function calPick(d){calSel=d;render();}
function openQuickAdd(date){
  openSheet(`<h3>Aggiungi al ${fmtD(date)} <span class="x" onclick="closeSheet()">✕</span></h3>
  <div class="fld"><label>Cosa</label><input id="qa-t" placeholder="es. Sopralluogo da Bernasconi"></div>
  <div class="frow">
    <div class="fld"><label>Tipo</label><select id="qa-type"><option value="appointment">Appuntamento</option><option value="maintenance">Manutenzione</option><option value="pellet">Consegna pellet</option><option value="note">Nota</option></select></div>
    <div class="fld"><label>Ora</label><input id="qa-time" type="time"></div>
  </div>
  <div class="fld"><label>Cliente (opzionale)</label><select id="qa-cl"><option value="">—</option>${S.clients.map(c=>`<option value="${c.id}">${esc(c.name)}</option>`).join('')}</select></div>
  <div class="actions"><button class="btn ghost" onclick="closeSheet()">Annulla</button><button class="btn pri" onclick="quickAddSave('${date}')">Salva</button></div>`);
}
function quickAddSave(date){
  const t=$('#qa-t').value.trim();if(!t){toast('Scrivi cosa devi fare');return;}
  const type=$('#qa-type').value,time=$('#qa-time').value||null,clientId=$('#qa-cl').value||null;
  const p={type,title:t,date,time,person:clientId?{kind:'client',id:clientId,name:cName(clientId)}:null,qty:null,unit:null};
  const msg=commitParsed(p,'cal');closeSheet();toast(msg);render();
}
/* ================= NOTE & APPUNTAMENTI ================= */
let notesTab='app';let noteGroupSel='all';
function renderNotes(){
  const t=todayIso();
  const apps=visApp().slice().sort((a,b)=>((a.done?'z':'a')+a.date+(a.time||''))<((b.done?'z':'a')+b.date+(b.time||''))?-1:1);
  let notes=S.notes.slice();
  if(noteGroupSel==='arch')notes=notes.filter(n=>n.archived);
  else{notes=notes.filter(n=>!n.archived);if(noteGroupSel!=='all')notes=notes.filter(n=>n.groupId===noteGroupSel);}
  notes.sort((a,b)=>(b.pinned-a.pinned)||(b.created-a.created));
  const gName=id=>{const g=byId(S.noteGroups,id);return g?g.name:''};
  const archN=S.notes.filter(n=>n.archived).length;
  $('#main').innerHTML=`
  <div class="pagetitle"><span class="accent" style="background:var(--teal)"></span>Note & Appuntamenti</div>
  <div class="tabs">
    <div class="tb ${notesTab==='app'?'on':''}" onclick="notesTab='app';render()">📅 Appuntamenti (${visApp().filter(a=>!a.done).length})</div>
    <div class="tb ${notesTab==='note'?'on':''}" onclick="notesTab='note';render()">📝 Note (${S.notes.filter(n=>!n.archived).length})</div>
  </div>
  ${notesTab==='note'?`<div class="tabs" style="margin-top:-4px">
    <div class="tb ${noteGroupSel==='all'?'on':''}" onclick="noteGroupSel='all';render()">Tutte</div>
    ${S.noteGroups.map(g=>`<div class="tb ${noteGroupSel===g.id?'on':''}" onclick="noteGroupSel==='${g.id}'?groupMenu('${g.id}'):(noteGroupSel='${g.id}',render())">📁 ${esc(g.name)}${noteGroupSel===g.id?' ⋯':''}</div>`).join('')}
    <div class="tb" onclick="newGroup()">＋ Gruppo</div>
    <div class="tb ${noteGroupSel==='arch'?'on':''}" style="${archN?'':'opacity:.5'}" onclick="noteGroupSel='arch';render()">🗄 Archivio (${archN})</div>
  </div>`:''}
  <div class="card">
  ${notesTab==='app'
    ?(apps.length?apps.map(a=>`<div class="item" onclick="openApp('${a.id}')">
        <span class="led" style="background:${a.done?'var(--t3)':a.date<t?'#FF5C7A':'#00D4FF'}"></span>
        <div class="bd"><div class="ti" style="${a.done?'text-decoration:line-through;color:var(--t3)':''}">${esc(a.title)}</div>
        <div class="su">${esc(cName(a.clientId)||a.clientRaw||'')}${a.employeeId?' · 👷 '+esc(eName(a.employeeId)):''}</div></div>
        <div class="right"><div class="d1">${a.time||''}</div><div class="d2">${fmtD(a.date)}</div></div></div>`).join('')
      :'<div class="empty"><div class="big">📅</div>Nessun appuntamento.<br>Scrivilo nell\'Hub o premi +.</div>')
    :(notes.length?notes.map(n=>`<div class="item" onclick="openNote('${n.id}')">
        <span class="led" style="background:var(--teal)"></span>
        <div class="bd"><div class="ti">${n.pinned?'📌 ':''}${esc(n.text)}</div>
        <div class="su">${[n.groupId?'📁 '+esc(gName(n.groupId)):'',n.clientId?'👥 '+esc(cName(n.clientId)):''].filter(Boolean).join(' · ')}</div>
        <div class="mt">${n.date?'📅 '+fmtD(n.date):new Date(n.created).toLocaleDateString('it-CH')}</div></div>
        ${noteGroupSel!=='arch'?`<span class="row-act" style="border-color:var(--t3);color:var(--t3)" onclick="event.stopPropagation();n=byId(S.notes,'${n.id}');n.archived=true;save();render();toast('🗄 Archiviata')">🗄</span>`:''}</div>`).join('')
      :`<div class="empty"><div class="big">${noteGroupSel==='arch'?'🗄':'📝'}</div>${noteGroupSel==='arch'?'Archivio vuoto.':'Nessuna nota qui.'}</div>`)}
  </div>
  <button class="fab" onclick="${notesTab==='app'?`openQuickAdd('${todayIso()}')`:'newNote()'}">+</button>`;
}
function newGroup(){

const CMD_RE=/^\s*(aggiungi|segna|metti|crea|ricordami|ricorda|programma|inserisci)\b|^\//i;
async function sendChat(){
  const ta=$('#chatinput');const text=ta.value.trim();if(!text)return;
  const rows=[{id:uid(),emp_id:S.speaker,text,sys:false}];
  S.chat.push({id:rows[0].id,who:S.speaker,text,ts:Date.now()});
  if(CMD_RE.test(text)||/\b(manutenzione|pellet|sacch|appuntamento|sopralluogo|consegna)\b/i.test(text)&&parseDateIT(text).date){
    const p=parseInput(text.replace(/^\//,''));

    rows.push({id:uid(),emp_id:null,text:msg,sys:true});

/* ================= PELLET ================= */
let pelKind='sfuso';let pelView='dash';
const addDaysIso=(s,n)=>{const[y,m,d]=s.split('-').map(Number);const dt=new Date(y,m-1,d+n);return iso(dt);};
const spanDays=(a,b)=>{const[y1,m1,d1]=a.split('-').map(Number);const[y2,m2,d2]=b.split('-').map(Number);return Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000);};
function sfusoForecast(){
  const byClient={};
  S.pellet.filter(p=>(p.kind||'sacchi')==='sfuso'&&p.status==='consegnato'&&p.clientId&&p.date&&p.qty).forEach(p=>{(byClient[p.clientId]=byClient[p.clientId]||[]).push(p);});
  const out=[];
  for(const cid in byClient){
    const ds=byClient[cid].sort((a,b)=>a.date<b.date?-1:1);
    const last=ds[ds.length-1];
    let ratePerDay=null,nextDate=null,days=null;
    if(ds.length>=2){
      const span=spanDays(ds[0].date,last.date);
      const consumed=ds.slice(0,-1).reduce((s,p)=>s+(p.qty||0),0);
      if(span>0&&consumed>0){
        ratePerDay=consumed/span;
        nextDate=addDaysIso(last.date,Math.round((last.qty||0)/ratePerDay));
        days=relDays(nextDate);
      }
    }
    out.push({clientId:cid,ds,last,ratePerDay,nextDate,days});
  }
  return out.sort((a,b)=>(a.days==null?9999:a.days)-(b.days==null?9999:b.days));
}
function monthlyTotals(kind,unit){
  // ultimi 12 mesi → [{label,val}]
  const now=new Date();const out=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=d.getFullYear()+'-'+pad(d.getMonth()+1);
    const val=S.pellet.filter(p=>(p.kind||'sacchi')===kind&&p.status==='consegnato'&&p.date&&p.date.startsWith(key)&&(!unit||p.unit===unit)).reduce((s,p)=>s+(p.qty||0),0);
    out.push({label:MESI[d.getMonth()].slice(0,3),key,val});
  }
  return out;

function barChart(data,color,unitLbl){
  const max=Math.max(...data.map(d=>d.val),0.001);
  const bw=20,gap=8,W=14+data.length*(bw+gap),H=130,base=96;
  return`<div style="overflow-x:auto;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:8px 4px">
  <svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="6" y1="${base}" x2="${W-6}" y2="${base}" stroke="rgba(0,212,255,.15)"/>
    ${data.map((d,i)=>{
      const h=d.val?Math.max(3,Math.round(d.val/max*72)):0;
      const x=10+i*(bw+gap);
      return`<rect x="${x}" y="${base-h}" width="${bw}" height="${Math.max(h,1)}" rx="4" fill="${d.val?color:'rgba(82,113,138,.25)'}"/>
      ${d.val?`<text x="${x+bw/2}" y="${base-h-5}" text-anchor="middle" fill="#EAF6FF" font-size="9" font-family="JetBrains Mono">${fmtQty(d.val)}</text>`:''}
      <text x="${x+bw/2}" y="${base+14}" text-anchor="middle" fill="#52718A" font-size="8.5" font-family="JetBrains Mono">${d.label}</text>`;
    }).join('')}
  </svg></div>`;
}

/* allegati (Supabase Storage) */
const attUrl={};let attFetching={};
function ensureAttUrls(s){
  const miss=s.attachments.filter(a=>!attUrl[a.id]&&!attFetching[a.id]&&a.storagePath);
  if(!miss.length)return;
  miss.forEach(a=>attFetching[a.id]=true);
  Promise.all(miss.map(a=>sb.storage.from('allegati').createSignedUrl(a.storagePath,3600).then(({data})=>{if(data)attUrl[a.id]=data.signedUrl;})))
    .then(()=>{const o=$('#overlay');if(o)openSite(s.id);})
    .catch(()=>{});
}
async function addPhoto(id,ev){
  const f=ev.target.files[0];if(!f)return;
  const img=new Image();const r=new FileReader();
  r.onload=()=>{img.onload=()=>{
    const max=1280;let w=img.width,h=img.height;
    if(w>max||h>max){const k=max/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    cv.toBlob(async blob=>{
      try{
        const name='foto-'+todayIso()+'.jpg';
        const path=id+'/'+uid()+'-'+name;
        const{error:e1}=await sb.storage.from('allegati').upload(path,blob,{contentType:'image/jpeg'});
        if(e1)throw e1;
        const row={id:uid(),site_id:id,name,type:'img',storage_path:path,date:todayIso()};
        const{error:e2}=await sb.from('attachments').insert(row);
        if(e2)throw e2;
        const s=byId(S.sites,id);
        s.attachments.push({id:row.id,name,type:'img',storagePath:path,date:row.date});
        openSite(id);toast('📷 Foto caricata ('+Math.round(blob.size/1024)+'KB)');
      }catch(err){toast('⚠ Upload: '+(err.message||err));}
    },'image/jpeg',.72);
  };img.src=r.result;};
  r.readAsDataURL(f);
}
async function addFile(id,ev){
  const f=ev.target.files[0];if(!f)return;
  if(f.size>25*1024*1024){toast('⚠ File oltre 25MB');return;}
  try{
    const path=id+'/'+uid()+'-'+f.name;
    const{error:e1}=await sb.storage.from('allegati').upload(path,f,{contentType:f.type||'application/octet-stream'});
    if(e1)throw e1;
    const row={id:uid(),site_id:id,name:f.name,type:'file',storage_path:path,date:todayIso()};
    const{error:e2}=await sb.from('attachments').insert(row);
    if(e2)throw e2;
    const s=byId(S.sites,id);
    s.attachments.push({id:row.id,name:f.name,type:'file',storagePath:path,date:row.date});
    openSite(id);toast('📎 '+f.name+' caricato');
  }catch(err){toast('⚠ Upload: '+(err.message||err));}
}

async function delAtt(sid,aid){

  const s=byId(S.sites,sid);const a=byId(s.attachments,aid);

  box.innerHTML=html||'<div class="empty">Nessun risultato per «'+esc($('#gs-q').value)+'»</div>';

let sigDrawn=false;
function sigInit(){
  const c=$('#sigpad');if(!c)return;
  const dpr=window.devicePixelRatio||1;
  const w=c.offsetWidth,h=c.offsetHeight;
  c.width=w*dpr;c.height=h*dpr;
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#16243a';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
  sigDrawn=!!blt.signature;
  if(blt.signature){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,w,h);img.src=blt.signature;$('#sighint').style.display='none';}
  let down=false,lx=0,ly=0;
  const pos=e=>{const r=c.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];};
  c.addEventListener('pointerdown',e=>{e.preventDefault();down=true;[lx,ly]=pos(e);$('#sighint').style.display='none';c.setPointerCapture(e.pointerId);});
  c.addEventListener('pointermove',e=>{if(!down)return;e.preventDefault();const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();lx=x;ly=y;sigDrawn=true;});
  const up=e=>{if(down){down=false;blt.signature=c.toDataURL('image/png');}};
  c.addEventListener('pointerup',up);c.addEventListener('pointercancel',up);
}
function sigClear(){
  blt.signature=null;sigDrawn=false;
  const c=$('#sigpad');const dpr=window.devicePixelRatio||1;
  const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width/dpr,c.height/dpr);
  $('#sighint').style.display='flex';
}

    <div><div style="height:90px"></div><div class="sigline">Firma del tecnico — ${esc(eName(r.techId)||'')}</div></div>

/* ================= BOLLA CONSEGNA PELLET ================= */
let bolla=null;
function startBolla(id){
  const p=byId(S.pellet,id);if(!p)return;
  bolla={pid:id,signature:null,signedName:cName(p.clientId)||p.clientRaw||''};
  openSheet(`<h3>✍ Bolla di consegna <span class="x" onclick="closeSheet()">✕</span></h3>
  <div class="subtle" style="margin-bottom:12px"><b style="color:var(--t1)">${esc(cName(p.clientId)||p.clientRaw||'Cliente')}</b><br>
  ${p.kind==='sfuso'?'🛢 Sfuso':'📦 Sacchi'} — ${fmtQty(p.qty||0)} ${esc(p.unit||'')} · ${fmtD(todayIso())}${p.price?' · CHF '+fmtQty(p.price):''}</div>
  <div class="fld"><label>Firma del cliente alla consegna</label>
    <div class="sig-wrap"><canvas class="sig-canvas" id="bsigpad"></canvas><div class="sig-hint" id="bsighint">firma qui con il dito</div></div>
    <div class="sig-tools">
      <input value="${esc(bolla.signedName)}" oninput="bolla.signedName=this.value" placeholder="Nome di chi firma" style="background:var(--bg2);border:1px solid var(--line);border-radius:9px;color:var(--t1);font-size:12.5px;padding:7px 10px;outline:none;flex:1;margin-right:8px">
      <button class="btn sm ghost" onclick="bsigClear()">Cancella</button>
    </div></div>
  <div class="actions">
    <button class="btn ghost" onclick="closeSheet()">Annulla</button>
    <button class="btn pri" onclick="saveBolla()">✓ Consegnato</button></div>`);
  setTimeout(bsigInit,50);
}
function bsigInit(){
  const c=$('#bsigpad');if(!c)return;
  const dpr=window.devicePixelRatio||1;const w=c.offsetWidth,h=c.offsetHeight;
  c.width=w*dpr;c.height=h*dpr;
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#16243a';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
  let down=false,lx=0,ly=0;
  const pos=e=>{const r=c.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];};
  c.addEventListener('pointerdown',e=>{e.preventDefault();down=true;[lx,ly]=pos(e);$('#bsighint').style.display='none';c.setPointerCapture(e.pointerId);});
  c.addEventListener('pointermove',e=>{if(!down)return;e.preventDefault();const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();lx=x;ly=y;});
  const up=()=>{if(down){down=false;bolla.signature=c.toDataURL('image/png');}};
  c.addEventListener('pointerup',up);c.addEventListener('pointercancel',up);
}
function bsigClear(){bolla.signature=null;const c=$('#bsigpad');const dpr=window.devicePixelRatio||1;const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width/dpr,c.height/dpr);$('#bsighint').style.display='flex';}
function saveBolla(){
  const p=byId(S.pellet,bolla.pid);if(!p)return;
  if(!bolla.signature&&!confirm('Manca la firma. Segnare consegnato comunque?'))return;
  p.status='consegnato';p.signature=bolla.signature;p.signedName=bolla.signedName;
  if(!p.date)p.date=todayIso();
  if(!p.price)p.price=autoPrice(p)||null;
  save();closeSheet();render();toast('🔥 Consegnato'+(p.signature?' e firmato':''));
  if(p.signature)setTimeout(()=>printBollaAsk(p.id),350);
}
function printBollaAsk(id){

  <div class="subtle" style="margin-bottom:14px">Vuoi stampare subito la bolla firmata?</div>

}

  </div>
  <script>window.onload=()=>setTimeout(()=>window.print(),300)<\/script>

/* ================= EXPORT CSV ================= */
function csvDownload(name,header,rows){
  const escC=v=>{v=String(v==null?'':v);return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv='\ufeff'+[header,...rows].map(r=>r.map(escC).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'-'+todayIso()+'.csv';document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('⬇ '+name+'.csv esportato');
}
function csvPellet(){
  csvDownload('pellet',['Data','Cliente','Tipo','Quantità','Unità','Importo CHF','Stato','Firmata','Note'],
    S.pellet.map(p=>[p.date||'',cName(p.clientId)||p.clientRaw||'',p.kind||'',p.qty||'',p.unit||'',p.price||'',p.status,p.signature?'sì':'',p.notes||'']));
}
function csvMan(){
  csvDownload('manutenzioni',['Data','Cliente','Descrizione','Tecnico','Stato','Tariffa CHF','Bollettino','Esito'],
    S.maintenances.map(m=>[m.date||'',cName(m.clientId)||m.clientRaw||'',m.title,eName(m.employeeId)||'',m.status,m.price||'',m.report?'sì':'',m.report?m.report.outcome:'']));
}
function csvOre(){
  const rows=[];
  S.sites.forEach(s=>s.log.forEach(l=>{if(l.hours)rows.push([l.date||'',eName(l.empId)||'—',s.name,l.text,l.hours]);}));
  rows.sort((a,b)=>a[0]<b[0]?-1:1);
  csvDownload('ore-dipendenti',['Data','Dipendente','Cantiere','Lavoro','Ore'],rows);
}
function csvSites(){
  csvDownload('cantieri',['Nome','Cliente','Stato','Ore registrate','Ore stimate','Importo CHF','Inizio','Fine prevista'],
    S.sites.map(s=>[s.name,cName(s.clientId)||s.clientRaw||'',s.status,siteHours(s),s.estHours||'',s.amount||'',s.startDate||'',s.dueDate||'']));
}
