const fmtQty=n=>{const v=Math.round((n||0)*100)/100;return String(v).replace('.',',');};
function openPelClient(cid){
  const f=sfusoForecast().find(x=>x.clientId===cid);if(!f)return;
  const ds=f.ds;
  const maxQ=Math.max(...ds.map(p=>p.qty||0),0.001);
  const n=ds.length;const bw=Math.min(54,Math.floor(560/n)-10);
  const W=Math.max(280,n*(bw+10)+20),H=170,base=128;
  let bars='';
  ds.forEach((p,i)=>{
    const h=Math.max(4,Math.round((p.qty/maxQ)*100));
    const x=14+i*(bw+10);
    bars+=`<rect x="${x}" y="${base-h}" width="${bw}" height="${h}" rx="5" fill="url(#pelg)"/>
    <text x="${x+bw/2}" y="${base-h-7}" text-anchor="middle" fill="#2B2A24" font-size="11" font-family="JetBrains Mono">${fmtQty(p.qty)}</text>
    <text x="${x+bw/2}" y="${base+16}" text-anchor="middle" fill="#8A8170" font-size="9" font-family="JetBrains Mono">${p.date.slice(8,10)}.${p.date.slice(5,7)}</text>
    <text x="${x+bw/2}" y="${base+27}" text-anchor="middle" fill="#8A8170" font-size="8" font-family="JetBrains Mono">${p.date.slice(2,4)}</text>`;
  });
  openSheet(`<h3>🪵 ${esc(cName(cid))} <span class="x" onclick="closeSheet()">✕</span></h3>
  <div class="stats" style="grid-template-columns:repeat(3,1fr)">
    <div class="stat"><div class="n" style="font-size:16px">${fmtQty(ds.reduce((s,p)=>s+p.qty,0))} t</div><div class="l">Totale consegnato</div></div>
    <div class="stat"><div class="n" style="font-size:16px">${f.ratePerDay?fmtQty(f.ratePerDay*30)+' t':'—'}</div><div class="l">Consumo / mese</div></div>
    <div class="stat"><div class="n" style="font-size:16px;color:${f.days!=null&&f.days<=0?'var(--coral)':f.days!=null&&f.days<=30?'var(--amber)':'var(--teal)'}">${f.nextDate?(f.days<=0?'ora':f.days+' gg'):'—'}</div><div class="l">Prossimo pieno</div></div>
  </div>
  <div class="fld"><label>Consegne sfuso (tonnellate)</label>
    <div style="overflow-x:auto;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:8px 4px">
    <svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="pelg" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#B35415"/><stop offset="1" stop-color="#E2722E"/></linearGradient></defs>
      <line x1="8" y1="${base}" x2="${W-8}" y2="${base}" stroke="rgba(111,178,58,.18)"/>
      ${bars}
    </svg></div>
  </div>
  ${f.nextDate?`<div class="subtle" style="margin-bottom:12px">📅 Rifornimento stimato attorno al <b style="color:var(--t1)">${fmtD(f.nextDate)}</b> in base allo storico. La stima migliora a ogni consegna registrata.</div>`:'<div class="subtle" style="margin-bottom:12px">Con la prossima consegna registrata potrò stimare consumo e data del rifornimento.</div>'}
  <div class="actions">
    <button class="btn ghost" onclick="closeSheet()">Chiudi</button>
    <button class="btn pri" onclick="newPelForClient('${cid}')">+ Pianifica consegna</button>
  </div>`);
}
function newPelForClient(cid){
  const f=sfusoForecast().find(x=>x.clientId===cid);
  closeSheet();
  openPel(null,{kind:'sfuso',clientId:cid,qty:f&&f.last?f.last.qty:'',date:f&&f.nextDate&&relDays(f.nextDate)>0?f.nextDate:''});
}

  if(preset&&preset.kind==='sfuso')p.unit='t';
  openSheet(`<h3>${id?'Consegna pellet':'Nuova consegna'} <span class="x" onclick="closeSheet()">✕</span></h3>
  <div class="fld"><label>Tipo</label><div class="seg" id="pl-k">
    <div class="sg ${p.kind==='sfuso'?'on':''}" data-k="sfuso" onclick="pelKindPick(this)">🪵 Sfuso (t)</div>

  </div></div>
  <div class="frow">
  <div class="fld"><label>Quantità</label><input id="pl-q" type="number" inputmode="decimal" step="any" value="${p.qty||''}"></div>

  <div class="fld"><label>Cliente</label>${cSearch('pl-c')}<select id="pl-c" onchange="updClientPrev(this,'pl-cprev')"><option value="">—</option>${cOpt(p.clientId)}</select><div id="pl-cprev">${clientPreviewHTML(p.clientId)}</div></div>
  <div class="fld"><label>Assegna a (uno o più)</label>${empSeg('pl-e',empIdsOf(p))}</div>
  <div class="frow"><div class="fld"><label>Data</label><input id="pl-d" type="date" value="${p.date||''}"></div>
  <div class="fld"><label>Ora</label><input id="pl-h" type="time" value="${p.time||''}"></div></div>
  ${dateChips('pl-d')}
  <div class="fld"><label>Importo CHF ${p.kind==='sfuso'&&S.settings.pricePerTon?'(auto: q.tà × '+S.settings.pricePerTon+')':p.kind!=='sfuso'&&S.settings.pricePerBag?'(auto: q.tà × '+S.settings.pricePerBag+')':''}</label><input id="pl-pr" type="number" inputmode="decimal" step="any" value="${p.price||''}" placeholder="${autoPrice(p)||''}"></div>
  <div class="fld"><label>Note</label><textarea id="pl-n">${esc(p.notes||'')}</textarea></div>
  ${id&&p.status!=='consegnato'?`<button class="btn pri" style="width:100%;margin-bottom:10px" onclick="startBolla('${id}')">✍ Consegna con firma (bolla)</button>`:''}
  ${id&&p.signature?`<button class="btn" style="width:100%;margin-bottom:10px;border-color:var(--teal);color:var(--teal)" onclick="printBolla('${id}')">📄 Stampa bolla firmata</button>`:''}
  ${p.clientId?`<button class="btn" style="width:100%;margin-bottom:10px;border-color:var(--blue);color:var(--blue)" onclick="zoneFromSheet('pl-c')">📍 Vedi il cliente sulla mappa</button>`:''}
  <div class="actions">
    ${id?`<button class="btn danger" onclick="delItem('pellet','${id}')">Elimina</button>
    <button class="btn" onclick="togglePel('${id}')">${p.status==='consegnato'?'Riapri':'✓ Consegnato'}</button>`:''}
    <button class="btn pri" onclick="savePel('${id||''}')">Salva</button></div>`);
}
function pelKindPick(el){
  el.parentNode.querySelectorAll('.sg').forEach(x=>x.classList.remove('on'));el.classList.add('on');
  const k=el.dataset.k;
  $('#pl-u').innerHTML=(k==='sfuso'?['t']:['sacchi','kg']).map(u=>`<option>${u}</option>`).join('');
}
const autoPrice=p=>{
  if(!p.qty)return null;
  if(p.kind==='sfuso'&&S.settings.pricePerTon)return Math.round(p.qty*S.settings.pricePerTon*100)/100;
  if(p.kind!=='sfuso'&&p.unit==='sacchi'&&S.settings.pricePerBag)return Math.round(p.qty*S.settings.pricePerBag*100)/100;
  return null;
};
function savePel(id){
  const kind=$('#pl-k .sg.on')?.dataset.k||'sacchi';
  const data={qty:parseFloat($('#pl-q').value)||null,unit:$('#pl-u').value,kind,clientId:$('#pl-c').value||null,employees:empSegRead('pl-e'),date:$('#pl-d').value||null,time:$('#pl-h').value||null,notes:$('#pl-n').value.trim()};
  data.price=parseFloat($('#pl-pr').value)||autoPrice({...data})||null;
  const oldP=id?byId(S.pellet,id):null;const prevEmps=oldP?empIdsOf(oldP):[];
  if(id){Object.assign(oldP,data);}else{S.pellet.unshift({id:uid(),status:'da_consegnare',clientRaw:null,via:'manuale',created:Date.now(),...data});}
  const added=data.employees.filter(e=>!prevEmps.includes(e));
  if(added.length&&(oldP?oldP.status:'da_consegnare')!=='consegnato')pushNotify(added,'🪵 Consegna pellet assegnata',`${data.qty?fmtQty(data.qty)+' '+(data.unit||'sacchi'):'Consegna'} a ${cName(data.clientId)||(oldP&&oldP.clientRaw)||''}${data.date?' · '+fmtD(data.date):''}`);
  save();closeSheet();render();toast('🪵 Salvato');
}
function togglePel(id){const p=byId(S.pellet,id);p.status=p.status==='consegnato'?'da_consegnare':'consegnato';save();closeSheet();render();}

let siteTab='aperto';
function siteHours(s){return s.log.reduce((t,l)=>t+(l.hours||0),0);}
function renderSites(){
  const groups={aperto:[],da_fatturare:[],chiuso:[]};
  visSites().forEach(s=>{const g=groups[s.status||'aperto'];if(g)g.push(s);});
  const list=groups[siteTab]||[];
  const card=s=>{
    const hrs=siteHours(s);
    const pct=s.estHours?Math.min(100,Math.round(hrs/s.estHours*100)):null;
    const dd=s.dueDate?relDays(s.dueDate):null;
    const ddCol=dd==null?'var(--t3)':dd<0?'var(--coral)':dd<=7?'var(--amber)':'var(--t3)';

    <div class="su" style="font-size:11px;color:var(--t2);margin-bottom:9px">${esc(cName(s.clientId)||s.clientRaw||'—')}${s.employees.length?' · 👷 '+s.employees.map(eName).filter(Boolean).join(', '):''}</div>
    ${s.estHours?`<div style="display:flex;justify-content:space-between;font-size:10.5px;color:var(--t2);margin-bottom:4px"><span>Ore lavorate</span><span style="font-family:var(--mono);color:${pct>=100?'var(--amber)':'var(--t1)'}">${hrs} / ${s.estHours}h · ${pct}%</span></div><div class="ck-bar" style="height:7px;margin-bottom:10px"><i style="width:${pct}%;background:${pct>=90?'var(--amber)':'var(--cy)'}"></i></div>`:`<div class="su" style="margin-bottom:9px">${hrs}h registrate</div>`}
    <div style="display:flex;gap:11px;font-size:10px;color:var(--t3);font-family:var(--mono);align-items:center">
      ${s.dueDate&&s.status!=='chiuso'?`<span style="color:${ddCol}">⏳ ${dd<0?Math.abs(dd)+'gg oltre':dd+' gg'}</span>`:''}
      ${s.attachments.length?`<span>📎 ${s.attachments.length}</span>`:''}

      ${s.amount&&isOwner()?`<span style="margin-left:auto;color:var(--teal)">CHF ${fmtQty(s.amount)}</span>`:''}
    </div></div>`;
  };
  const totFatt=groups.da_fatturare.reduce((t,s)=>t+(s.amount||0),0);
  const totSites=groups.aperto.length+groups.da_fatturare.length+groups.chiuso.length;
  $('#main').innerHTML=`
  <div class="pagetitle"><span class="accent" style="background:var(--blue)"></span>Cantieri <span class="subtle">(${totSites})</span></div>
  <div class="kpis" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="n" style="color:var(--blue)">${groups.aperto.length}</div><div class="l">In corso</div></div>
    <div class="kpi"><div class="n" style="color:var(--amber)">${groups.da_fatturare.length}</div><div class="l">Da fatturare</div></div>
    ${isOwner()?`<div class="kpi"><div class="n" style="color:var(--teal);font-size:15px">${fmtQty(totFatt)}</div><div class="l">CHF in attesa</div></div>`:`<div class="kpi"><div class="n">${groups.chiuso.length}</div><div class="l">Archiviati</div></div>`}
  </div>
  <div class="tabs">
    <div class="tb ${siteTab==='aperto'?'on':''}" onclick="siteTab='aperto';render()">🔨 In corso (${groups.aperto.length})</div>
    <div class="tb ${siteTab==='da_fatturare'?'on':''}" onclick="siteTab='da_fatturare';render()" style="${groups.da_fatturare.length?'border-color:var(--amber);color:var(--amber)':''}">💰 Da fatturare (${groups.da_fatturare.length})</div>

    <div class="ck-bar" style="height:6px"><i style="width:${pct}%;${pct>=100?'background:var(--amber)':''}"></i></div>
    ${pct>=100?'<div class="subtle" style="color:var(--amber);margin-top:5px">⚠ Stima ore superata</div>':''}</div>`
   :`<div class="subtle" style="margin-bottom:10px">Ore registrate: ${hrs}h (nessuna stima impostata)</div>`}
  ${s.notes?`<div class="fld"><label>Note</label><div style="font-size:13px;line-height:1.5">${esc(s.notes)}</div></div>`:''}

const attUrl={};let attFetching={};
function ensureAttUrls(s){
  const miss=s.attachments.filter(a=>!attUrl[a.id]&&!attFetching[a.id]&&a.storagePath);
  if(!miss.length)return;
  miss.forEach(a=>attFetching[a.id]=true);

async function addPhoto(id,ev){
  const f=ev.target.files[0];if(!f)return;
  const img=new Image();const r=new FileReader();
  r.onload=()=>{img.onload=()=>{
    const max=1280;let w=img.width,h=img.height;
    if(w>max||h>max){const k=max/Math.max(w,h);w=Math.round(w*k);h=Math.round(h*k);}
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    cv.toBlob(async blob=>{
      try{
        const name='foto-'+todayIso()+'.jpg';
        const path=id+'/'+uid()+'-'+name;
        const{error:e1}=await sb.storage.from('allegati').upload(path,blob,{contentType:'image/jpeg'});
        if(e1)throw e1;
        const row={id:uid(),site_id:id,name,type:'img',storage_path:path,date:todayIso()};
        const{error:e2}=await sb.from('attachments').insert(row);
        if(e2)throw e2;
        const s=byId(S.sites,id);
        s.attachments.push({id:row.id,name,type:'img',storagePath:path,date:row.date});
        openSite(id);toast('📷 Foto caricata ('+Math.round(blob.size/1024)+'KB)');
      }catch(err){toast('⚠ Upload: '+(err.message||err));}
    },'image/jpeg',.72);
  };img.src=r.result;};
  r.readAsDataURL(f);
}
async function addFile(id,ev){
  const f=ev.target.files[0];if(!f)return;
  if(f.size>25*1024*1024){toast('⚠ File oltre 25MB');return;}

    const path=id+'/'+uid()+'-'+f.name;
    const{error:e1}=await sb.storage.from('allegati').upload(path,f,{contentType:f.type||'application/octet-stream'});
    if(e1)throw e1;

function monthLabel(mk){const[y,m]=mk.split('-');const nm=MESI[+m-1]||'';return nm.charAt(0).toUpperCase()+nm.slice(1)+' '+y;}
function shiftMonth(mk,n){let[y,m]=mk.split('-').map(Number);m+=n;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+'-'+String(m).padStart(2,'0');}
function contiSetMonth(n){contiMonth=shiftMonth(cMonth(),n);render();}
function contiSetYear(n){contiMonth=shiftMonth(cMonth(),n*12);render();}
function monthsOfYear(yr){const a=[];for(let m=1;m<=12;m++)a.push(yr+'-'+String(m).padStart(2,'0'));return a;}
function speseAnnoByMonth(yr){return monthsOfYear(yr).map((k,i)=>({label:MESI[i].slice(0,3),key:k,val:speseTot(k)}));}
function speseAnnoTot(yr){return monthsOfYear(yr).reduce((t,k)=>t+speseTot(k),0);}
function speseCatMese(mk){const o={};speseMese(mk).forEach(e=>{const c=e.category||'Altro';o[c]=(o[c]||0)+(e.amount||0);});return o;}
function speseCatAnno(yr){const o={};monthsOfYear(yr).forEach(k=>speseMese(k).forEach(e=>{const c=e.category||'Altro';o[c]=(o[c]||0)+(e.amount||0);}));return o;}
function catBars(obj){
  const ents=Object.entries(obj).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!ents.length)return'<div class="subtle" style="padding:6px 2px">Nessuna spesa.</div>';
  const max=Math.max(...ents.map(e=>e[1]));
  return ents.map(([c,v])=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:3px"><span>${esc(c)}</span><span style="font-family:var(--mono);color:var(--coral)">CHF ${fmtQty(v)}</span></div><div class="ck-bar" style="height:7px"><i style="width:${Math.round(v/max*100)}%;background:var(--coral)"></i></div></div>`).join('');
}
function maintPrice(kind){const r=S.maintPrices.find(x=>x.kind===kind);return r&&r.price!=null?r.price:null;}
function maintIncome(m){const lp=maintPrice(m.type);return lp!=null?lp:(m.price||0);}
function siteIncomeMonth(s){const d=s.closedDate||s.dueDate||s.startDate||(s.created?iso(new Date(s.created)):'');return d?d.slice(0,7):'';}
function siteSpese(sid){return S.expenses.filter(e=>e.siteId===sid).reduce((t,e)=>t+(e.amount||0),0);}
function monthsDiff(a,b){const[ya,ma]=a.split('-').map(Number);const[yb,mb]=b.split('-').map(Number);return(yb-ya)*12+(mb-ma);}
function expenseInMonth(e,mk){if(!e.date)return false;const em=e.date.slice(0,7);if(!e.recur)return em===mk;const d=monthsDiff(em,mk);return d>=0&&d%e.recur===0;}
function speseMese(mk){return S.expenses.filter(e=>expenseInMonth(e,mk));}
function speseTot(mk){return speseMese(mk).reduce((t,e)=>t+(e.amount||0),0);}
function entrate(mk){
  const pellet=S.pellet.filter(p=>p.status==='consegnato'&&p.date&&p.date.slice(0,7)===mk).reduce((t,p)=>t+(p.price||0),0);
  const man=S.maintenances.filter(m=>m.status==='fatta'&&m.date&&m.date.slice(0,7)===mk).reduce((t,m)=>t+maintIncome(m),0);
  const cant=S.sites.filter(s=>s.status==='chiuso'&&siteIncomeMonth(s)===mk).reduce((t,s)=>t+(s.amount||0),0);
  return{pellet,man,cant,tot:pellet+man+cant};
}
const entrRow=(label,val)=>`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px"><span class="subtle">${label}</span><span style="font-family:var(--mono);color:var(--teal)">CHF ${fmtQty(val)}</span></div>`;
function expRow(e){const sn=e.siteId?(byId(S.sites,e.siteId)||{}).name:'';const rl=recurLabel(e.recur);return`<div class="item" onclick="openExpense('${e.id}')"><div class="bd"><div class="ti">${esc(e.category||'Spesa')} · <span style="color:var(--coral)">CHF ${fmtQty(e.amount||0)}</span>${rl?` <span class="badge" style="border-color:var(--cy);color:var(--cy)">${rl}</span>`:''}</div><div class="su">${fmtD(e.date)}${e.note?' · '+esc(e.note):''}${sn?' · 🏗 '+esc(sn):''}</div></div></div>`;}

const monthBar=mk=>`<div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px"><button class="cal-nav" onclick="contiSetMonth(-1)">‹</button><b style="font-size:15px">${monthLabel(mk)}</b><button class="cal-nav" onclick="contiSetMonth(1)">›</button></div>`;
function lastMonths(mk,n){const a=[];let k=mk;for(let i=0;i<n;i++){a.unshift(k);k=shiftMonth(k,-1);}return a;}
function contiTrend(mk){
  const data=lastMonths(mk,6).map(k=>({k,e:entrate(k).tot,s:speseTot(k)}));
  const max=Math.max(0.001,...data.map(d=>Math.max(d.e,d.s)));
  const bars=data.map(d=>{const he=d.e?Math.max(3,Math.round(d.e/max*50)):0;const hs=d.s?Math.max(3,Math.round(d.s/max*50)):0;const lab=(MESI[+d.k.split('-')[1]-1]||'').slice(0,3);return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:74px"><div style="display:flex;gap:3px;align-items:flex-end;height:52px"><div style="width:8px;height:${he}px;background:var(--teal);border-radius:2px"></div><div style="width:8px;height:${hs}px;background:var(--coral);border-radius:2px"></div></div><span style="font-size:8.5px;color:var(--t3);margin-top:5px">${lab}</span></div>`;}).join('');
  return`<div class="card"><div class="sh"><span class="t">📈 Entrate vs Spese · 6 mesi</span><span style="font-size:10px;color:var(--t3)"><span style="color:var(--teal)">▮</span> entr. <span style="color:var(--coral)">▮</span> spese</span></div><div style="display:flex;gap:6px;margin-top:4px">${bars}</div></div>`;
}
function contiRiepilogo(mk){
  const e=entrate(mk);const sp=speseTot(mk);const ut=e.tot-sp;
  const pmk=shiftMonth(mk,-1);const put=entrate(pmk).tot-speseTot(pmk);
  const delta=put?Math.round((ut-put)/Math.abs(put)*100):null;
  const list=speseMese(mk).slice().sort((a,b)=>(a.date<b.date?1:-1));
  const emax=Math.max(e.pellet,e.man,e.cant,0.001);
  const ebar=(ic,label,val,col)=>`<div style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span style="color:var(--t2)">${ic} ${label}</span><span style="font-family:var(--mono);color:var(--teal)">CHF ${fmtQty(val)}</span></div><div class="ck-bar" style="height:6px"><i style="width:${Math.round(val/emax*100)}%;background:${col}"></i></div></div>`;
  return`${monthBar(mk)}
  <div class="card" style="border-color:rgba(46,158,94,.4);background:rgba(46,158,94,.05);text-align:center;padding:14px">
    <div class="subtle" style="font-size:11px;letter-spacing:.5px">UTILE DI ${monthLabel(mk).toUpperCase()}</div>
    <div style="font-size:30px;font-weight:700;color:${ut>=0?'var(--teal)':'var(--coral)'};margin:3px 0">${ut>=0?'+':''}${fmtQty(ut)}<span style="font-size:14px;color:var(--t3);font-weight:400"> CHF</span></div>
    ${delta!=null?`<div style="font-size:10.5px;color:${delta>=0?'var(--teal)':'var(--coral)'}">${delta>=0?'▲':'▼'} ${Math.abs(delta)}% rispetto a ${MESI[+pmk.split('-')[1]-1]}</div>`:'<div class="subtle" style="font-size:10px">entrate − spese del mese</div>'}
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:12px">
    <div class="stat"><div class="subtle" style="font-size:11px">↘ Entrate</div><div style="font-size:19px;font-weight:700;color:var(--teal)">${fmtQty(e.tot)}</div><div class="subtle" style="font-size:10px">CHF</div></div>
    <div class="stat"><div class="subtle" style="font-size:11px">↗ Spese</div><div style="font-size:19px;font-weight:700;color:var(--coral)">${fmtQty(sp)}</div><div class="subtle" style="font-size:10px">CHF</div></div>
  </div>
  ${contiTrend(mk)}
  <div class="card"><div class="sh"><span class="t">📥 Da dove arrivano le entrate</span></div>
    ${ebar('🪵','Pellet',e.pellet,'#5E9E2E')}
    ${ebar('🔧','Manutenzioni',e.man,'var(--amber)')}
    ${ebar('🏗','Cantieri',e.cant,'var(--blue)')}
  </div>
  <div class="card"><div class="sh"><span class="t">📤 Spese del mese</span><button class="btn sm pri" onclick="openExpense('')">+ Spesa</button></div>
    ${list.length?list.map(expRow).join(''):'<div class="subtle" style="padding:6px 2px">Nessuna spesa in questo mese.</div>'}
  </div>`;
}
function contiSpese(mk){
  const yr=mk.slice(0,4);

  const addBtn=`<button class="btn pri" style="width:100%;margin-bottom:10px" onclick="openExpense('')">+ Aggiungi spesa</button>`;
  if(contiSpeseView==='anno'){
    const months=speseAnnoByMonth(yr);const tot=speseAnnoTot(yr);const avg=Math.round(tot/12);
    return`${seg}
    <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px"><button class="cal-nav" onclick="contiSetYear(-1)">‹</button><b style="font-size:15px">Anno ${yr}</b><button class="cal-nav" onclick="contiSetYear(1)">›</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
      <div class="stat"><div class="subtle" style="font-size:11px">Totale anno</div><div style="font-size:18px;font-weight:700;color:var(--coral)">${fmtQty(tot)}</div><div class="subtle" style="font-size:10px">CHF</div></div>
      <div class="stat"><div class="subtle" style="font-size:11px">Media al mese</div><div style="font-size:18px;font-weight:700;color:var(--amber)">${fmtQty(avg)}</div><div class="subtle" style="font-size:10px">CHF</div></div>
    </div>
    ${addBtn}
    <div class="card"><div class="sh"><span class="t">📊 Andamento mensile ${yr}</span></div>${barChart(months,'#D64528')}</div>
    <div class="card"><div class="sh"><span class="t">🏷 Per categoria</span></div>${catBars(speseCatAnno(yr))}</div>`;
  }
  const list=speseMese(mk).slice().sort((a,b)=>(a.date<b.date?1:-1));const tot=speseTot(mk);
  return`${seg}${monthBar(mk)}
  <div class="card"><div class="sh"><span class="t">Totale del mese</span><span class="t" style="font-family:var(--mono);color:var(--coral)">CHF ${fmtQty(tot)}</span></div></div>
  ${addBtn}

}

function saveExpense(id){
  let category=$('#ex-cat').value;
  if(category==='Altro'){const oth=($('#ex-cat-c')?.value||'').trim();if(oth)category=oth;}
  const data={date:$('#ex-d').value||todayIso(),amount:parseFloat($('#ex-a').value)||null,category,recur:+($('#ex-r')?.value||0),siteId:$('#ex-s').value||null,note:$('#ex-n').value.trim()};
  if(!data.amount){toast('Manca l’importo');return;}
  if(id){Object.assign(byId(S.expenses,id),data);}else{S.expenses.unshift({id:uid(),created:Date.now(),...data});}
  save();closeSheet();render();toast('💸 Spesa salvata');
}
function delExpense(id){if(!confirm('Eliminare questa spesa?'))return;S.expenses=S.expenses.filter(x=>x.id!==id);save();closeSheet();render();toast('🗑 Eliminata');}

/* cancellazione cliente a cascata (GDPR art.17): rimuove anche figli + foto/file nello Storage */
async function delClient(id){
  const c=byId(S.clients,id);if(!c)return;
  const man=S.maintenances.filter(m=>m.clientId===id);
  const app=S.appointments.filter(a=>a.clientId===id);
  const pel=S.pellet.filter(p=>p.clientId===id);
  const sit=S.sites.filter(s=>s.clientId===id);
  const not=S.notes.filter(n=>n.clientId===id);
  const cal=S.callLog.filter(x=>x.clientId===id);
  const atts=sit.flatMap(s=>s.attachments||[]);
  const parts=[];
  if(man.length)parts.push(man.length+' manutenzioni');
  if(app.length)parts.push(app.length+' appuntamenti');
  if(pel.length)parts.push(pel.length+' consegne pellet');
  if(sit.length)parts.push(sit.length+' cantieri');
  if(not.length)parts.push(not.length+' note');
  if(atts.length)parts.push(atts.length+' foto/file');
  if(!confirm(`Eliminare DEFINITIVAMENTE il cliente "${c.name}"?`+(parts.length?'\n\nVerranno cancellati anche:\n• '+parts.join('\n• '):'')+'\n\nNon si può annullare. (In alternativa puoi BLOCCARE il cliente.)'))return;
  try{
    const paths=atts.map(a=>a.storagePath).filter(Boolean);
    if(paths.length)await sb.storage.from('allegati').remove(paths);
    const aids=atts.map(a=>a.id);
    if(aids.length)await sb.from('attachments').delete().in('id',aids);
    // foto/file collegati direttamente al cliente: rimuovi i file dallo Storage (le righe spariscono via cascade FK)
    const{data:cAtt}=await sb.from('client_attachments').select('storage_path').eq('client_id',id);
    const cPaths=(cAtt||[]).map(r=>r.storage_path).filter(Boolean);
    if(cPaths.length)await sb.storage.from('allegati').remove(cPaths);
  }catch(e){toast('⚠ Pulizia allegati: '+(e.message||e));}
  S.maintenances=S.maintenances.filter(m=>m.clientId!==id);
  S.appointments=S.appointments.filter(a=>a.clientId!==id);
  S.pellet=S.pellet.filter(p=>p.clientId!==id);
  S.sites=S.sites.filter(s=>s.clientId!==id);
  S.notes=S.notes.filter(n=>n.clientId!==id);
  S.callLog=S.callLog.filter(x=>x.clientId!==id);
  S.clients=S.clients.filter(x=>x.id!==id);
  save();closeSheet();render();toast('🗑 Cliente e dati collegati eliminati');
}

let sigDrawn=false;
function sigInit(){
  const c=$('#sigpad');if(!c)return;
  const dpr=window.devicePixelRatio||1;
  const w=c.offsetWidth,h=c.offsetHeight;
  c.width=w*dpr;c.height=h*dpr;
  const ctx=c.getContext('2d');ctx.scale(dpr,dpr);
  ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='#16243a';ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
  sigDrawn=!!blt.signature;
  if(blt.signature){const img=new Image();img.onload=()=>ctx.drawImage(img,0,0,w,h);img.src=blt.signature;$('#sighint').style.display='none';}
  let down=false,lx=0,ly=0;
  const pos=e=>{const r=c.getBoundingClientRect();return[e.clientX-r.left,e.clientY-r.top];};
  c.addEventListener('pointerdown',e=>{e.preventDefault();down=true;[lx,ly]=pos(e);$('#sighint').style.display='none';c.setPointerCapture(e.pointerId);});
  c.addEventListener('pointermove',e=>{if(!down)return;e.preventDefault();const[x,y]=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(x,y);ctx.stroke();lx=x;ly=y;sigDrawn=true;});
  const up=e=>{if(down){down=false;blt.signature=c.toDataURL('image/png');}};
  c.addEventListener('pointerup',up);c.addEventListener('pointercancel',up);
}
function sigClear(){
  blt.signature=null;sigDrawn=false;
  const c=$('#sigpad');const dpr=window.devicePixelRatio||1;
  const ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width/dpr,c.height/dpr);
  $('#sighint').style.display='flex';
}

  p.status='consegnato';p.signature=bolla.signature;p.signedName=bolla.signedName;
  if(!p.date)p.date=todayIso();
  if(!p.price)p.price=autoPrice(p)||null;
  if(!wasDone){const doer=(me()&&me().name)||'';pushNotify(ownerIds(),'🪵 Consegna fatta',`${doer}: ${p.qty?fmtQty(p.qty)+' '+(p.unit||'sacchi'):'consegna'} a ${cName(p.clientId)||p.clientRaw||''}`);}
  save();closeSheet();render();toast('🪵 Consegnato'+(p.signature?' e firmato':''));
  if(p.signature)setTimeout(()=>printBollaAsk(p.id),350);
}

/* ================= EXPORT CSV ================= */
function csvDownload(name,header,rows){
  const escC=v=>{v=String(v==null?'':v);return /[";\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;};
  const csv='\ufeff'+[header,...rows].map(r=>r.map(escC).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name+'-'+todayIso()+'.csv';document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
  toast('⬇ '+name+'.csv esportato');
}
function csvPellet(){
  csvDownload('pellet',['Data','Cliente','Tipo','Quantità','Unità','Importo CHF','Stato','Firmata','Note'],
    S.pellet.map(p=>[p.date||'',cName(p.clientId)||p.clientRaw||'',p.kind||'',p.qty||'',p.unit||'',p.price||'',p.status,p.signature?'sì':'',p.notes||'']));
}
function csvMan(){
  csvDownload('manutenzioni',['Data','Cliente','Descrizione','Tecnico','Stato','Tariffa CHF','Bollettino','Esito'],
    S.maintenances.map(m=>[m.date||'',cName(m.clientId)||m.clientRaw||'',m.title,empNames(m)||'',m.status,m.price||'',m.report?'sì':'',m.report?m.report.outcome:'']));
}
function csvOre(){
  const rows=[];
  S.sites.forEach(s=>s.log.forEach(l=>{if(l.hours)rows.push([l.date||'',eName(l.empId)||'—',s.name,l.text,l.hours]);}));
  rows.sort((a,b)=>a[0]<b[0]?-1:1);
  csvDownload('ore-dipendenti',['Data','Dipendente','Cantiere','Lavoro','Ore'],rows);
}
function csvSites(){
  csvDownload('cantieri',['Nome','Cliente','Stato','Ore registrate','Ore stimate','Importo CHF','Inizio','Fine prevista'],
    S.sites.map(s=>[s.name,cName(s.clientId)||s.clientRaw||'',s.status,siteHours(s),s.estHours||'',s.amount||'',s.startDate||'',s.dueDate||'']));
}

/* ================= AUTO-AGGIORNAMENTO ================= */
let _updChk=0;
async function checkUpdate(){
  const now=Date.now();
  if(now-_updChk<30000)return; _updChk=now;
  try{
    const r=await fetch('./version.json?t='+now,{cache:'no-store'});
    if(!r.ok)return;
    const j=await r.json();
    if(j&&j.version&&j.version!==APP_VERSION){
      if(sessionStorage.getItem('cw_upd')===j.version)return; /* gia' tentato: evita loop */
      sessionStorage.setItem('cw_upd',j.version);
      try{toast('Aggiornamento in corso…');}catch(e){}
      /* ricarico con la versione in query: l'URL cambia → il browser NON serve
         l'HTML vecchio dalla cache (altrimenti l'app restava bloccata sulla
         versione precedente nonostante version.json fosse aggiornato) */
      setTimeout(()=>{location.replace(location.pathname+'?v='+encodeURIComponent(j.version)+location.hash);},1300);
    }
  }catch(e){/* offline o errore: ignora, l'app continua a funzionare */}
}
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')checkUpdate();});
